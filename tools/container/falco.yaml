name: falco
version: "1.0"
category: container/runtime-security
phase: monitoring
command: python3
args:
  - "/app/tools/_custom/falco-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "3600s"

short_description: Container runtime security
description: |
  Falco is a cloud native runtime security tool for Linux operating systems.

parameters:
  - name: rules
    type: string
    required: false
    description: Custom rules file

output:
  format: json

enabled: true
