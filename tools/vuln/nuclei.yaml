name: nuclei
version: "1.0"
category: vuln/general
phase: scanning
command: nuclei
args: []

docker:
  image: projectdiscovery/nuclei:latest
  memory_limit: "1g"
  timeout: "600s"

short_description: Fast and customizable vulnerability scanner based on templates
description: |
  Nuclei is a fast tool for configurable targeted scanning based on templates
  offering massive extensibility and ease of use. It is used to send requests
  across targets based on a template, leading to zero false positives and
  providing fast scanning on a large number of hosts.
notes: |
  - Templates are auto-updated on first run
  - Use -t to specify custom templates
  - Use -severity to filter by severity
  - Use -tags to filter by tags
  - Use -c for concurrent threads (default: 25)

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-silent -nc"
    description: "Raw nuclei flags (e.g. -severity critical,high -tags cve)"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL or host to scan"

output:
  format: text
  success_patterns:
    - "\\[.*\\]"
    - "matched"
  failure_patterns:
    - "no templates provided"
    - "context deadline exceeded"
  severity_indicators:
    critical: ["\\[critical\\]"]
    high: ["\\[high\\]"]
    medium: ["\\[medium\\]"]
    low: ["\\[low\\]"]
    info: ["\\[info\\]"]

chain_suggestions:
  before: ["httpx", "nmap"]
  after: []

enabled: true
