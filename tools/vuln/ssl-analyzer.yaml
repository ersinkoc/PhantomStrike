name: ssl-analyzer
version: "1.0"
category: vuln/ssl-tls
phase: scanning
command: python3
args: ["/app/tools/_custom/ssl-analyzer.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "120s"

short_description: SSL/TLS configuration analyzer
description: |
  Lightweight SSL/TLS analyzer that checks certificate details, protocol
  versions, cipher suites, and common misconfigurations. Reports an overall
  grade and identifies weak protocols and ciphers.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target host[:port] (default port 443)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Connection timeout in seconds"

output:
  format: text
  severity_indicators:
    critical:
      - "CRITICAL"
      - "expired"
      - "SSLv2"
      - "SSLv3"
    high:
      - "HIGH"
      - "self-signed"
      - "Weak cipher"
      - "TLSv1.0"
      - "Hostname mismatch"
    medium:
      - "MEDIUM"
      - "TLSv1.1"
      - "expires in"

chain_suggestions:
  before:
    - "nmap"
    - "httpx"
  after:
    - "testssl"

enabled: true
