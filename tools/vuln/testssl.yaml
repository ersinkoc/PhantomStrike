name: testssl
version: "1.0"
category: vuln/ssl-tls
phase: scanning
command: testssl.sh
args: []

docker:
  image: drwetter/testssl.sh:latest
  memory_limit: "512m"
  timeout: "600s"

short_description: Command-line tool for testing TLS/SSL encryption and vulnerabilities
description: |
  testssl.sh is a free command-line tool that checks a server's TLS/SSL service
  for supported protocols, standard cipher suites, certificate details, and
  known cryptographic vulnerabilities. It tests for Heartbleed, CCS Injection,
  Ticketbleed, ROBOT, BREACH, POODLE, DROWN, LOGJAM, BEAST, and more.
notes: |
  - testssl.sh runs all tests by default; use specific flags to run targeted checks.
  - Use --jsonfile for machine-parseable JSON output.
  - The --full flag runs all checks including less common tests.
  - Use --ip one to test only one IP if the hostname resolves to multiple addresses.
  - Testing takes 2-5 minutes per host depending on server responsiveness.

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "--color 0"
    description: "Raw testssl flags (e.g. --full -p -U --ip one)"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target host:port (e.g. example.com:443 or https://example.com)"

output:
  format: text
  success_patterns:
    - "Testing"
    - "Done"
    - "Overall Grade"
    - "not vulnerable"
  failure_patterns:
    - "Fatal error"
    - "doesn't seem to be a TLS/SSL enabled server"
    - "Cannot connect"
    - "Unable to open"
  severity_indicators:
    critical:
      - "VULNERABLE"
      - "Heartbleed"
      - "CCS"
      - "ROBOT"
      - "DROWN"
      - "SSLv2"
    high:
      - "POODLE"
      - "BEAST"
      - "FREAK"
      - "LOGJAM"
      - "SSLv3"
      - "RC4"
      - "expired"
    medium:
      - "TLS 1.0"
      - "TLS 1.1"
      - "SWEET32"
      - "LUCKY13"
      - "weak"
      - "SHA1"
    low:
      - "BREACH"
      - "no HSTS"
      - "no OCSP"
      - "certificate chain"

chain_suggestions:
  before:
    - "nmap"
    - "httpx"
  after:
    - "nuclei"

enabled: true
