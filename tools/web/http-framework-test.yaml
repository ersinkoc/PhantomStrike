name: http-framework-test
version: "1.0"
category: web/framework-testing
phase: scanning
command: http-framework-test
docker:
  image: phantomstrike/http-framework-test:latest
  args:
    - "-u"
    - "${target}"
    - "-o"
    - "/output/http-framework-results.json"
  memory_limit: "512m"
  timeout: "300s"

short_description: HTTP framework testing
description: |
  Tests HTTP frameworks for known vulnerabilities.

parameters:
  - name: target
    type: string
    required: true

output:
  format: json

enabled: false
