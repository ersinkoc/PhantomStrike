name: http-framework-test
version: "1.0"
category: web/framework-testing
phase: scanning
command: python3
args: ["/app/tools/_custom/http-framework-test.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Web framework detector and misconfiguration tester
description: |
  Detects web frameworks (WordPress, Django, Laravel, Express, ASP.NET,
  Spring Boot, Flask, Rails, nginx, Apache) and tests for known
  misconfigurations specific to each framework.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: skip_misconfig
    type: bool
    required: false
    flag: "--skip-misconfig"
    default: false
    description: "Skip misconfiguration checks"

output:
  format: text
  success_patterns:
    - "Framework detected"
    - "Misconfiguration"
  severity_indicators:
    high:
      - "HIGH"
      - "exposed"
    medium:
      - "MEDIUM"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "nuclei"
    - "nikto"

enabled: true
