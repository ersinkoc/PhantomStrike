name: nikto
version: "1.0"
category: web/vulnerability-scanning
phase: scanning
command: nikto
args: ["-ask", "no", "-nointeractive"]

docker:
  image: phantomstrike/nikto:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Comprehensive web server scanner for misconfigurations and vulnerabilities
description: |
  Nikto is an open-source web server scanner that performs comprehensive tests
  against web servers for multiple items including over 6700 potentially dangerous
  files/CGIs, checks for outdated versions of over 1250 servers, and identifies
  server configuration issues. It supports SSL, proxy, host authentication,
  and output in multiple formats.
notes: |
  - Uses -ask no for non-interactive mode (set in args)
  - Nikto is noisy by design; not suitable for stealthy assessments
  - Use ssl flag for HTTPS targets
  - Tuning codes: 1=Files, 2=Misconfig, 3=Info, 4=XSS, 5=Command Injection, 6=RFI

parameters:
  - name: ssl
    type: bool
    required: false
    flag: "-ssl"
    default: false
    description: "Force SSL mode for HTTPS targets"
  - name: port
    type: string
    required: false
    flag: "-p"
    description: "Port to scan (default: 80)"
  - name: tuning
    type: string
    required: false
    flag: "-Tuning"
    description: "Scan tuning codes (e.g. 123 for Files+Misconfig+Info)"
  - name: timeout
    type: string
    required: false
    flag: "-timeout"
    default: "10"
    description: "Timeout for requests in seconds"
  - name: target
    type: string
    required: true
    flag: "-h"
    description: "Target host URL or IP (e.g. http://target.com or 192.168.1.1)"

output:
  format: text
  success_patterns:
    - "\\+ Target IP:"
    - "\\+ Target Hostname:"
    - "\\+ Server:"
    - "OSVDB-"
    - "requests:"
  failure_patterns:
    - "ERROR"
    - "No web server found"
    - "0 host(s) tested"
  severity_indicators:
    critical:
      - "Remote Code Execution"
      - "Command Injection"
      - "SQL Injection"
      - "Remote File Inclusion"
    high:
      - "OSVDB-"
      - "Server leaks"
      - "directory indexing"
      - "default account"
    medium:
      - "X-Frame-Options"
      - "X-Content-Type-Options"
      - "Strict-Transport-Security"
      - "outdated"
    low:
      - "Server banner"
      - "uncommon header"
      - "allowed HTTP Methods"

chain_suggestions:
  before:
    - "nmap"
    - "httpx"
  after:
    - "sqlmap"
    - "nuclei"
    - "ffuf"

enabled: true
