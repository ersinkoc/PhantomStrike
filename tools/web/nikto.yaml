name: nikto
version: "1.0"
category: web/vulnerability-scanning
phase: scanning
command: nikto
args: []

short_description: Comprehensive web server scanner for misconfigurations and vulnerabilities
description: |
  Nikto is an open-source web server scanner that performs comprehensive tests
  against web servers for multiple items including over 6700 potentially dangerous
  files/CGIs, checks for outdated versions of over 1250 servers, and identifies
  server configuration issues. It supports SSL, proxy, host authentication,
  and output in multiple formats.
notes: |
  - Runs in process mode (no Docker) - requires nikto installed locally
  - Uses -ask no for non-interactive mode
  - Nikto is noisy by design; not suitable for stealthy assessments
  - Use -ssl flag for HTTPS targets
  - Tuning codes: 1=Files, 2=Misconfig, 3=Info, 4=XSS, 5=Command Injection, 6=RFI

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-ask no"
    description: "Raw nikto flags (e.g. -ask no -ssl -p 443 -Tuning 123)"
  - name: target
    type: string
    required: true
    flag: "-h"
    description: "Target host URL or IP (e.g. http://target.com or 192.168.1.1)"

output:
  format: text
  success_patterns:
    - "\\+ Target IP:"
    - "\\+ Target Hostname:"
    - "\\+ Server:"
    - "OSVDB-"
    - "requests:"
  failure_patterns:
    - "ERROR"
    - "No web server found"
    - "0 host(s) tested"
  severity_indicators:
    critical:
      - "Remote Code Execution"
      - "Command Injection"
      - "SQL Injection"
      - "Remote File Inclusion"
    high:
      - "OSVDB-"
      - "Server leaks"
      - "directory indexing"
      - "default account"
    medium:
      - "X-Frame-Options"
      - "X-Content-Type-Options"
      - "Strict-Transport-Security"
      - "outdated"
    low:
      - "Server banner"
      - "uncommon header"
      - "allowed HTTP Methods"

chain_suggestions:
  before:
    - "nmap"
    - "httpx"
  after:
    - "sqlmap"
    - "nuclei"
    - "ffuf"

enabled: true
