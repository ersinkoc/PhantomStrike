name: cors-checker
version: "1.0"
category: web/cors
phase: scanning
command: python3
args: ["/app/tools/_custom/cors-checker.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: CORS misconfiguration checker
description: |
  Checks for CORS misconfigurations by testing various Origin headers
  including evil.com, null, subdomain reflection, and domain suffix attacks.
  Reports whether credentials can be leaked and assesses severity.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL (e.g., https://api.example.com)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: methods
    type: bool
    required: false
    flag: "--methods"
    default: false
    description: "Also check preflight OPTIONS response"

output:
  format: text
  severity_indicators:
    critical:
      - "CRITICAL"
      - "credential theft"
      - "full CORS bypass"
    high:
      - "HIGH"
      - "Arbitrary origin reflected"
    medium:
      - "MEDIUM"
      - "Subdomain origin accepted"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "nuclei"

enabled: true
