name: xsser
version: "1.0"
category: web/xss-automation
phase: exploitation
command: xsser
docker:
  image: phantomstrike/xsser:latest
  args:
    - "-u"
    - "${target}"
    - "--auto"
    - "--Fp"
    - "-o"
    - "/output/xsser-results"
  memory_limit: "1g"
  timeout: "1800s"

short_description: XSS automation framework
description: |
  XSSer is an automatic framework to detect, exploit and report XSS vulnerabilities.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL

output:
  format: html

enabled: false
