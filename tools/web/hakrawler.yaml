name: hakrawler
version: "1.0"
category: web/crawling
phase: reconnaissance
command: hakrawler
docker:
  image: hakluke/hakrawler:latest
  args:
    - "-url"
    - "${target}"
    - "-depth"
    - "3"
    - "-plain"
  memory_limit: "1g"
  timeout: "600s"

short_description: Fast web crawler
description: |
  Hakrawler is a fast, flexible, and easily configurable web crawler.
  Designed for quick, easy content discovery.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: depth
    type: integer
    required: false
    default: 3

output:
  format: text

enabled: true
