name: hakrawler
version: "1.0"
category: web/crawling
phase: reconnaissance
command: hakrawler
args: ["-plain"]

docker:
  image: phantomstrike/hakrawler:latest
  memory_limit: "1g"
  timeout: "600s"

short_description: Fast web crawler
description: |
  Hakrawler is a fast, flexible, and easily configurable web crawler.
  Designed for quick, easy content discovery.
notes: |
  - Syntax: hakrawler -url <url> [options]

parameters:
  - name: target
    type: string
    required: true
    flag: "-url"
    description: "Target URL to crawl"
  - name: depth
    type: string
    required: false
    flag: "-depth"
    default: "3"
    description: "Maximum crawl depth"

output:
  format: text

enabled: true
