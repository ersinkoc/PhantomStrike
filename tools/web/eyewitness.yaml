name: eyewitness
version: "1.0"
category: web/screenshotting
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/eyewitness-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: HTTP response info capture (title, headers, SSL, page summary)
description: |
  EyeWitness-lite captures HTTP response information including page title, server
  headers, redirect chains, SSL certificate info, and a text summary describing
  what the page shows. Checks for missing security headers.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL or file with URLs (one per line)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: no_ssl
    type: bool
    required: false
    flag: "--no-ssl"
    default: false
    description: "Skip SSL certificate info"

output:
  format: text
  severity_indicators:
    high:
      - "Missing Security Headers"
    medium:
      - "HSTS"
      - "CSP"

chain_suggestions:
  before:
    - "httpx"
    - "subfinder"
  after:
    - "nuclei"

enabled: true
