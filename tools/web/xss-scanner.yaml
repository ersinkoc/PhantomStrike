name: xss-scanner
version: "1.0"
category: web/xss
phase: scanning
command: python3
args: ["/app/tools/_custom/xss-scanner.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: Reflected XSS scanner for URL parameters and forms
description: |
  Tests for reflected XSS in URL parameters and HTML forms.
  Injects multiple XSS payloads and checks if they are reflected
  in the response. Reports reflection context (HTML body, attribute,
  JavaScript) and severity.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL with parameters (e.g., https://example.com/search?q=test)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: forms
    type: bool
    required: false
    flag: "--forms"
    default: false
    description: "Also test HTML forms on the page"

output:
  format: text
  success_patterns:
    - "Reflected XSS"
    - "reflection(s) found"
  failure_patterns:
    - "Connection failed"
    - "No reflection detected"
  severity_indicators:
    high:
      - "HIGH"
      - "html_body"
      - "javascript"
    medium:
      - "MEDIUM"
      - "attribute"

chain_suggestions:
  before:
    - "katana"
    - "httpx"
    - "paramspider"
  after:
    - "nuclei"
    - "dalfox"

enabled: true
