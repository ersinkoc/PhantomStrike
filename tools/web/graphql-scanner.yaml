name: graphql-scanner
version: "1.0"
category: web/graphql-security
phase: scanning
command: graphql-scanner
docker:
  image: dolevf/graphql-scan:latest
  args:
    - "-u"
    - "${target}"
    - "-o"
    - "/output/graphql-results.json"
  memory_limit: "512m"
  timeout: "600s"

short_description: GraphQL security scanner
description: |
  GraphQL security scanner for finding vulnerabilities in GraphQL APIs.

parameters:
  - name: target
    type: string
    required: true
    description: GraphQL endpoint

output:
  format: json

enabled: true
