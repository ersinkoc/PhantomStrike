name: graphql-scanner
version: "1.0"
category: web/graphql-security
phase: scanning
command: python3
args: ["/app/tools/_custom/graphql-scanner.py"]
docker:
  image: phantomstrike/graphql-scanner:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: GraphQL security scanner
description: |
  Detects GraphQL endpoints and tests for introspection.
  Enumerates types, queries, and mutations when introspection is enabled.

parameters:
  - name: target
    type: string
    required: true
    description: Target base URL

output:
  format: text

enabled: true
