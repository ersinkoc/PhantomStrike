name: x8
version: "1.0"
category: web/hidden-parameter
phase: scanning
command: python3
args: ["/app/tools/_custom/x8-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Hidden parameter discovery via brute-force
description: |
  x8-lite discovers hidden URL parameters by brute-forcing common parameter
  names and detecting reflected parameters. Identifies parameters that change
  response behavior (status, size) or reflect input values.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL (e.g., http://example.com/page)"
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    description: "Custom parameter wordlist"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: delay
    type: string
    required: false
    flag: "--delay"
    default: "0"
    description: "Delay between requests (seconds)"
  - name: verbose
    type: bool
    required: false
    flag: "-v"
    default: false
    description: "Show all tested parameters"

output:
  format: text
  success_patterns:
    - "FOUND"
    - "REFLECTED"
  severity_indicators:
    high:
      - "REFLECTED"
    medium:
      - "FOUND"
      - "STATUS"
      - "SIZE_DIFF"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "xss-scanner"
    - "burp"

enabled: true
