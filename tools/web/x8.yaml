name: x8
version: "1.0"
category: web/hidden-parameter
phase: scanning
command: x8
docker:
  image: phantomstrike/x8:latest
  args:
    - "-u"
    - "${target}"
    - "-w"
    - "/wordlists/parameters.txt"
    - "-o"
    - "/output/x8-results.txt"
  memory_limit: "1g"
  timeout: "600s"

short_description: Hidden parameter discovery
description: |
  x8 is a tool to find hidden parameters that can be vulnerable
  or useful for further testing.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL

output:
  format: text

enabled: true
