name: dalfox
version: "1.0"
category: web/xss
phase: exploitation
command: dalfox
docker:
  image: hahwul/dalfox:latest
  args:
    - "url"
    - "${target}"
    - "--format"
    - "json"
    - "--output"
    - "/output/dalfox-results.json"
    - "--worker"
    - "10"
  memory_limit: "1g"
  timeout: "1800s"

short_description: XSS scanning and parameter analysis
description: |
  DalFox is a powerful open source XSS scanning tool and parameter analyzer.
  It focuses on automation and high performance.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: worker
    type: integer
    required: false
    default: 10
    description: Number of worker threads

output:
  format: json
  success_patterns:
    - "POC"
    - "found"

enabled: true
