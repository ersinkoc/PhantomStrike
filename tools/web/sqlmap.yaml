name: sqlmap
version: "1.0"
category: web/sql-injection
phase: exploitation
command: sqlmap
docker:
  image: paoloo/sqlmap:latest
  args:
    - "-u"
    - "${target}"
    - "--batch"
    - "--dump-all"
    - "--output-dir=/output/sqlmap"
  memory_limit: "1g"
  timeout: "1800s"

short_description: Automatic SQL injection tool
description: |
  Sqlmap automates detecting and exploiting SQL injection flaws and taking
  over database servers. Supports MySQL, PostgreSQL, Oracle, SQL Server.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL with parameters
  - name: level
    type: integer
    required: false
    default: 1
    description: Test level (1-5)
  - name: risk
    type: integer
    required: false
    default: 1
    description: Risk level (1-3)

output:
  format: json
  success_patterns:
    - "injection"

chain_suggestions:
  before:
    - nuclei

enabled: true
