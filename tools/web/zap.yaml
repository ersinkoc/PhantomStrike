name: zap
version: "1.0"
category: web/vulnerability-scanning
phase: scanning
command: python3
args: ["/app/tools/_custom/zap-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Active web scanner with spidering and vuln testing
description: |
  ZAP-lite actively scans web applications by spidering the site, finding forms,
  and testing for common vulnerabilities including SQLi, XSS, LFI, and RFI.
  Reports findings with severity ratings.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL (e.g., http://example.com)"
  - name: depth
    type: string
    required: false
    flag: "-d"
    default: "20"
    description: "Max pages to spider"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"

output:
  format: text
  success_patterns:
    - "SQL Injection"
    - "XSS"
    - "LFI"
    - "RFI"
  severity_indicators:
    critical:
      - "CRITICAL"
      - "LFI"
      - "RFI"
    high:
      - "HIGH"
      - "SQLi"
      - "XSS"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "nuclei"
    - "sqlmap"

enabled: true
