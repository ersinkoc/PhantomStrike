name: paramspider
version: "1.0"
category: web/parameter-mining
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/paramspider-lite.py"]
docker:
  image: phantomstrike/paramspider:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: Parameter mining tool
description: |
  Finds URL parameters from web archives. Identifies potentially
  interesting parameters for injection testing.

parameters:
  - name: domain
    type: string
    required: true
    description: Target domain

output:
  format: text

enabled: true
