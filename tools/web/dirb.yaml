name: dirb
version: "1.0"
category: web/directory-discovery
phase: scanning
command: dirb

docker:
  image: phantomstrike/dirb:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Web Content Scanner
description: |
  DIRB is a Web Content Scanner. It looks for existing (and/or hidden)
  Web Objects by launching a dictionary-based attack against a web server.
  It uses a dictionary-based approach and supports recursive scanning.
notes: |
  - Falls back to phantomstrike-tools:latest all-in-one image
  - -r disables recursive scanning by default, -S enables silent mode
  - target (URL) and wordlist are positional arguments
  - Dirb syntax: dirb <url> <wordlist> [options]
  - Positional args must come first (URL then wordlist), flags after

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL to scan (e.g. http://target.com/)"
  - name: wordlist
    type: string
    required: false
    flag: ""
    default: "/usr/share/dirb/wordlists/common.txt"
    description: "Wordlist file path"
  - name: options
    type: string
    required: false
    flag: ""
    default: "-r -S"
    description: "Additional dirb options (e.g. '-r -S' for no-recursion and silent mode)"

output:
  format: text
  success_patterns:
    - "CODE:200"
    - "CODE:301"
    - "FOUND"
    - "DIRECTORY"
  failure_patterns:
    - "FATAL"
    - "Connection refused"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "nuclei"

enabled: true
