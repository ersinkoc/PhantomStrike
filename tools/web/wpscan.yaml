name: wpscan
version: "1.0"
category: web/wordpress
phase: scanning
command: wpscan
docker:
  image: wpscanteam/wpscan:latest
  args:
    - "--url"
    - "${target}"
    - "--format"
    - "json"
    - "-o"
    - "/output/wpscan-results.json"
    - "--enumerate"
    - "vp,vt,cb,dbe,u,m"
    - "--api-token"
    - "${api_token}"
  memory_limit: "1g"
  timeout: "1800s"

short_description: WordPress security scanner
description: |
  WPScan is a free, for non-commercial use, black box WordPress security scanner
  written for security professionals and blog maintainers.

parameters:
  - name: target
    type: string
    required: true
    description: WordPress site URL
  - name: api_token
    type: string
    required: false
    description: WPScan API token for vulnerability data
  - name: enumerate
    type: string
    required: false
    default: "vp,vt,cb,dbe,u,m"
    description: Enumeration options

output:
  format: json
  severity_indicators:
    CRITICAL:
      - "CRITICAL"
    HIGH:
      - "HIGH"

enabled: true
