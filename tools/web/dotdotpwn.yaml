name: dotdotpwn
version: "1.0"
category: web/directory-traversal
phase: exploitation
command: dotdotpwn
docker:
  image: phantomstrike/dotdotpwn:latest
  args:
    - "-m"
    - "http"
    - "-h"
    - "${target}"
    - "-o"
    - "json"
  memory_limit: "512m"
  timeout: "1800s"

short_description: Directory traversal fuzzer
description: |
  Dotdotpwn is a flexible intelligent fuzzer to discover
  directory traversal vulnerabilities.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL

output:
  format: json

enabled: false
