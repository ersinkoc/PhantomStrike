name: dotdotpwn
version: "1.0"
category: web/directory-traversal
phase: exploitation
command: python3
args: ["/app/tools/_custom/dotdotpwn-lite.py"]
docker:
  image: phantomstrike/dotdotpwn:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Directory traversal fuzzer
description: |
  Path traversal checker that tests common traversal patterns
  including encoded variants against multiple injection points.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL

output:
  format: text

enabled: true
