name: jaeles
version: "1.0"
category: web/vulnerability-scanning
phase: scanning
command: python3
args: ["/app/tools/_custom/jaeles-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Signature-based web vulnerability scanner
description: |
  Jaeles-lite tests for common web vulnerabilities using pattern matching
  signatures. Detects SQL errors, stack traces, information leaks, LFI,
  SSTI, open redirects, backup files, and sensitive endpoints.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: severity
    type: string
    required: false
    flag: "--severity"
    description: "Minimum severity filter (LOW, MEDIUM, HIGH, CRITICAL)"

output:
  format: text
  success_patterns:
    - "SQL Error"
    - "XSS"
    - "LFI"
    - "SSTI"
    - "Information Leak"
  severity_indicators:
    critical:
      - "CRITICAL"
      - "LFI"
    high:
      - "HIGH"
      - "SQL Error"
      - "XSS"
    medium:
      - "MEDIUM"
      - "Stack Trace"
      - "Debug"

chain_suggestions:
  before:
    - "httpx"
    - "katana"
  after:
    - "nuclei"

enabled: true
