name: whatweb
version: "1.0"
category: web/fingerprinting
phase: reconnaissance
command: whatweb
docker:
  image: wpscanteam/whatweb:latest
  args:
    - "${target}"
    - "--log-json=/output/whatweb-results.json"
    - "-a"
    - "3"
  memory_limit: "512m"
  timeout: "300s"

short_description: Web fingerprinting scanner
description: |
  WhatWeb identifies websites. It recognizes web technologies including
  content management systems (CMS), blogging platforms, and more.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: aggression
    type: integer
    required: false
    default: 3
    description: Aggression level (1-4)

output:
  format: json

enabled: true
