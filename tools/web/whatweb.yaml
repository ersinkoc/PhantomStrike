name: whatweb
version: "1.0"
category: web/fingerprinting
phase: reconnaissance
command: whatweb
args: ["--log-json=/output/whatweb-results.json"]

docker:
  image: phantomstrike/whatweb:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Web fingerprinting scanner
description: |
  WhatWeb identifies websites. It recognizes web technologies including
  content management systems (CMS), blogging platforms, and more.
notes: |
  - Syntax: whatweb [options] <url>
  - URL is a positional argument

parameters:
  - name: aggression
    type: string
    required: false
    flag: "-a"
    default: "3"
    description: "Aggression level (1=stealthy, 3=aggressive, 4=heavy)"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL to fingerprint (e.g. http://example.com)"

output:
  format: json

enabled: true
