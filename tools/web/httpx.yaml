name: httpx
version: "1.0"
category: web/reconnaissance
phase: reconnaissance
command: httpx
docker:
  image: projectdiscovery/httpx:latest
  args:
    - "-l"
    - "/input/hosts.txt"
    - "-json"
    - "-o"
    - "/output/httpx-results.json"
    - "-threads"
    - "50"
    - "-title"
    - "-tech-detect"
    - "-status-code"
    - "-follow-redirects"
  memory_limit: "512m"
  timeout: "300s"

short_description: Fast and multi-purpose HTTP toolkit
description: |
  Httpx is a fast and multi-purpose HTTP toolkit that allows running multiple
  probes using the retryablehttp library. It supports probing multiple protocols
  and has smart fallback mechanisms.

parameters:
  - name: target
    type: string
    required: true
    description: Target host or file with hosts
  - name: threads
    type: integer
    required: false
    default: 50
    description: Number of threads
  - name: timeout
    type: integer
    required: false
    default: 10
    description: Timeout in seconds

output:
  format: json
  success_patterns:
    - "url"

chain_suggestions:
  after:
    - nuclei
    - ffuf

enabled: true
