name: wafw00f
version: "1.0"
category: web/waf-detection
phase: reconnaissance
command: wafw00f
args: ["-o", "/output/wafw00f-results.json", "-f", "json"]

docker:
  image: phantomstrike/wafw00f:latest
  memory_limit: "256m"
  timeout: "300s"

short_description: Web Application Firewall detector
description: |
  WAFW00F identifies and fingerprints Web Application Firewall (WAF)
  products protecting a website.
notes: |
  - Syntax: wafw00f <url> [options]
  - URL is a positional argument

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL to check for WAF (e.g. http://example.com)"

output:
  format: json

enabled: true
