name: wafw00f
version: "1.0"
category: web/waf-detection
phase: reconnaissance
command: wafw00f
docker:
  image: phantomstrike/wafw00f:latest
  args:
    - "${target}"
    - "-o"
    - "/output/wafw00f-results.json"
    - "-f"
    - "json"
  memory_limit: "256m"
  timeout: "300s"

short_description: Web Application Firewall detector
description: |
  WAFW00F identifies and fingerprints Web Application Firewall (WAF)
  products protecting a website.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL

output:
  format: json

enabled: true
