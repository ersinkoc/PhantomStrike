name: gobuster
version: "1.0"
category: web/directory-enum
phase: scanning
command: gobuster
args: ["dir"]

docker:
  image: ghcr.io/oj/gobuster:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Directory/file/DNS busting tool
description: |
  Gobuster is a tool used to brute-force URIs (directories and files),
  DNS subdomains, and virtual host names. Fast and written in Go.
notes: |
  - The 'dir' subcommand is in args by default for directory brute-forcing
  - Requires a wordlist (-w) for brute-forcing
  - Use threads to set concurrency (default: 50)
  - Use extensions to append file extensions (e.g. php,txt,html)

parameters:
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    default: "/usr/share/wordlists/dirb/common.txt"
    description: "Path to wordlist file"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "50"
    description: "Number of concurrent threads"
  - name: extensions
    type: string
    required: false
    flag: "-x"
    description: "File extensions to search for (e.g. php,txt,html,asp)"
  - name: status_codes
    type: string
    required: false
    flag: "-s"
    default: "200,204,301,302,307,401,403"
    description: "Positive status codes"
  - name: expanded
    type: bool
    required: false
    flag: "-e"
    default: true
    description: "Expanded mode, print full URLs"
  - name: no_error
    type: bool
    required: false
    flag: "--no-error"
    default: true
    description: "Don't display errors"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL to brute-force"

output:
  format: text
  success_patterns:
    - "Status: 200"
    - "Status: 301"
    - "Status: 302"
    - "Found:"
  failure_patterns:
    - "Error"
    - "Unable to connect"
    - "invalid URI"
  severity_indicators:
    high:
      - "admin"
      - "backup"
      - "config"
      - ".env"
      - "phpinfo"
    medium:
      - "login"
      - "dashboard"
      - "api"
      - "upload"
    low:
      - "Status: 200"
      - "Status: 301"

chain_suggestions:
  before:
    - "httpx"
    - "nmap"
  after:
    - "nuclei"
    - "nikto"

enabled: true
