name: gobuster
version: "1.0"
category: web/directory-enum
phase: scanning
command: gobuster
docker:
  image: ghcr.io/oj/gobuster:latest
  args:
    - "dir"
    - "-u"
    - "${target}"
    - "-w"
    - "/wordlists/common.txt"
    - "-o"
    - "/output/gobuster-results.txt"
    - "-t"
    - "50"
  memory_limit: "512m"
  timeout: "600s"

short_description: Directory/file/DNS busting tool
description: |
  Gobuster is a tool used to brute-force URIs (directories and files),
  DNS subdomains, and virtual host names.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: mode
    type: string
    required: false
    default: "dir"
    enum: [dir, dns, vhost, fuzz]

output:
  format: text

enabled: true
