name: commix
version: "1.0"
category: web/command-injection
phase: exploitation
command: commix
args: ["--batch", "--output-dir=/output"]

docker:
  image: phantomstrike/commix:latest
  memory_limit: "1g"
  timeout: "1800s"

short_description: Command injection exploiter
description: |
  Commix (short for [comm]and [i]njection e[x]ploiter) is an automated tool
  that can be used by web developers, penetration testers, and security
  researchers to test web applications for command injection vulnerabilities.
notes: |
  - Syntax: commix -u <url> [options]
  - --batch ensures non-interactive mode

parameters:
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL with injectable parameter (e.g. http://target.com/page?param=value)"
  - name: data
    type: string
    required: false
    flag: "--data"
    description: "POST data string"

output:
  format: text

enabled: true
