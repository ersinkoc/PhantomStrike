name: http-intruder
version: "1.0"
category: web/http-testing
phase: scanning
command: python3
args: ["/app/tools/_custom/http-intruder.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: HTTP parameter brute-forcer with anomaly detection
description: |
  HTTP Intruder brute-forces parameter values from a wordlist and detects
  anomalies in response size, status code, and response time compared
  to a baseline. Built-in payload list includes SQLi, XSS, and fuzzing strings.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL with params (e.g., http://example.com/api?id=1)"
  - name: param
    type: string
    required: false
    flag: "-p"
    description: "Parameter to fuzz (default: first found)"
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    description: "Path to wordlist file"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: threshold
    type: string
    required: false
    flag: "--threshold"
    default: "0.1"
    description: "Response size anomaly threshold (0.0-1.0)"
  - name: method
    type: string
    required: false
    flag: "--method"
    default: "GET"
    description: "HTTP method (GET or POST)"

output:
  format: text
  success_patterns:
    - "ANOMALY"
  severity_indicators:
    high:
      - "ANOMALY"
      - "status"
      - "size"

chain_suggestions:
  before:
    - "httpx"
    - "paramspider"
  after:
    - "nuclei"

enabled: true
