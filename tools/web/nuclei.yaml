name: nuclei
version: "1.0"
category: web/vulnerability-scanning
phase: exploitation
command: nuclei
args: []

docker:
  image: projectdiscovery/nuclei:latest
  memory_limit: "2g"
  timeout: "1800s"

short_description: Fast vulnerability scanner using templates
description: |
  Nuclei is a fast tool for configurable targeted scanning based on templates
  offering massive extensibility and ease of use. It has 8000+ templates for CVEs,
  misconfigurations, exposed panels, and more.
notes: |
  - Templates are auto-updated on first run
  - Use -t to specify custom template paths
  - Use -severity to filter by severity level
  - Use -tags to filter by template tags
  - Use -c for concurrent templates, -rl for rate limit

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-silent -nc"
    description: "Raw nuclei flags (e.g. -severity critical,high -tags cve -c 50 -rl 150)"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL or host to scan"

output:
  format: text
  success_patterns:
    - "\\[.*\\]"
    - "matched"
  failure_patterns:
    - "no templates provided"
    - "context deadline exceeded"
    - "error"
  severity_indicators:
    critical: ["\\[critical\\]"]
    high: ["\\[high\\]"]
    medium: ["\\[medium\\]"]
    low: ["\\[low\\]"]
    info: ["\\[info\\]"]

chain_suggestions:
  before:
    - httpx
  after:
    - ffuf

enabled: true
