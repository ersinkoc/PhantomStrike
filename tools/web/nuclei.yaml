name: nuclei
version: "1.0"
category: web/vulnerability-scanning
phase: exploitation
command: nuclei
args: ["-silent", "-nc"]

docker:
  image: projectdiscovery/nuclei:latest
  memory_limit: "2g"
  timeout: "300s"

short_description: Fast vulnerability scanner using templates
description: |
  Nuclei is a fast tool for configurable targeted scanning based on templates
  offering massive extensibility and ease of use. It has 8000+ templates for CVEs,
  misconfigurations, exposed panels, and more.
notes: |
  - Templates are auto-updated on first run
  - Use severity to filter by severity level
  - Use tags to filter by template tags
  - Use templates to specify custom template paths

parameters:
  - name: severity
    type: string
    required: false
    flag: "-severity"
    default: "critical,high,medium"
    description: "Severity levels to scan for (e.g. critical,high,medium,low)"
  - name: templates
    type: string
    required: false
    flag: "-t"
    description: "Template or template directory paths"
  - name: tags
    type: string
    required: false
    flag: "-tags"
    description: "Tags to filter templates (e.g. cve,rce,sqli)"
  - name: rate_limit
    type: string
    required: false
    flag: "-rl"
    default: "150"
    description: "Maximum requests per second"
  - name: concurrency
    type: string
    required: false
    flag: "-c"
    default: "25"
    description: "Number of concurrent templates to process"
  - name: timeout
    type: string
    required: false
    flag: "-timeout"
    default: "30"
    description: "Timeout in seconds for each request"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL or host to scan"

output:
  format: text
  success_patterns:
    - "\\[.*\\]"
    - "matched"
  failure_patterns:
    - "no templates provided"
    - "context deadline exceeded"
    - "error"
  severity_indicators:
    critical: ["\\[critical\\]"]
    high: ["\\[high\\]"]
    medium: ["\\[medium\\]"]
    low: ["\\[low\\]"]
    info: ["\\[info\\]"]

chain_suggestions:
  before:
    - httpx
  after:
    - ffuf

enabled: true
