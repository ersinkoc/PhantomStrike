name: nuclei
version: "1.0"
category: web/vulnerability-scanning
phase: exploitation
command: nuclei
docker:
  image: projectdiscovery/nuclei:latest
  args:
    - "-u"
    - "${target}"
    - "-json"
    - "-o"
    - "/output/nuclei-results.json"
    - "-c"
    - "50"
    - "-rl"
    - "150"
  memory_limit: "2g"
  timeout: "1800s"

short_description: Fast vulnerability scanner using templates
description: |
  Nuclei is a fast tool for configurable targeted scanning based on templates
  offering massive extensibility and ease of use. It has 8000+ templates for CVEs,
  misconfigurations, exposed panels, and more.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL or host to scan
  - name: templates
    type: string
    required: false
    description: Template directory or specific templates to run
  - name: severity
    type: string
    required: false
    default: "critical,high,medium"
    description: Severity levels to scan for
  - name: rate-limit
    type: integer
    required: false
    default: 150
    description: Requests per second rate limit
  - name: tags
    type: string
    required: false
    description: Tags to filter templates

output:
  format: json
  success_patterns:
    - "matched"
  failure_patterns:
    - "error"
  severity_indicators:
    CRITICAL:
      - "\"severity\": \"critical\""
    HIGH:
      - "\"severity\": \"high\""

chain_suggestions:
  before:
    - httpx
  after:
    - ffuf

enabled: true
