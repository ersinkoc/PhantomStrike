name: wfuzz
version: "1.0"
category: web/fuzzing
phase: scanning
command: wfuzz
args: ["--hc", "404"]

docker:
  image: phantomstrike/wfuzz:latest
  memory_limit: "1g"
  timeout: "600s"

short_description: Web application fuzzer
description: |
  Wfuzz is a tool designed for bruteforcing Web Applications.
  It can be used for finding resources and injection points.
notes: |
  - Syntax: wfuzz -w <wordlist> --hc 404 <url>/FUZZ
  - Target URL with FUZZ keyword is a positional argument at the end

parameters:
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    default: "/wordlists/common.txt"
    description: "Wordlist file path"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Number of concurrent connections"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL with FUZZ keyword (e.g. http://target.com/FUZZ)"

output:
  format: text

enabled: true
