name: dirsearch
version: "1.0"
category: web/directory-bruteforce
phase: scanning
command: dirsearch
docker:
  image: kalilinux/dirsearch:latest
  args:
    - "-u"
    - "${target}"
    - "-e"
    - "php,asp,aspx,jsp,html,txt"
    - "-o"
    - "/output/dirsearch-results.json"
    - "--format=json"
    - "-t"
    - "50"
  memory_limit: "1g"
  timeout: "600s"

short_description: Web path scanner
description: |
  dirsearch is a command-line tool designed to brute force directories
  and files in webservers.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: extensions
    type: string
    required: false
    description: File extensions

output:
  format: json

enabled: true
