name: dirsearch
version: "1.0"
category: web/directory-bruteforce
phase: scanning
command: dirsearch
args: ["--no-color"]

docker:
  image: phantomstrike/dirsearch:latest
  memory_limit: "1g"
  timeout: "300s"

short_description: Web path scanner and directory brute-forcer
description: |
  dirsearch is a command-line tool designed to brute force directories
  and files in webservers. It is a mature and highly configurable tool
  with support for extensions, threading, and recursive scanning.
notes: |
  - Falls back to phantomstrike-tools:latest all-in-one image
  - Use extensions to specify file types to discover
  - Use threads for concurrent scanning speed

parameters:
  - name: extensions
    type: string
    required: false
    flag: "-e"
    default: "php,asp,aspx,jsp,html,txt"
    description: "File extensions to scan for"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "50"
    description: "Number of threads"
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    description: "Custom wordlist path"
  - name: exclude_status
    type: string
    required: false
    flag: "--exclude-status"
    default: "404"
    description: "Exclude status codes from results"
  - name: recursive
    type: bool
    required: false
    flag: "-r"
    default: false
    description: "Recursive scanning"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL to scan"

output:
  format: text
  success_patterns:
    - "200"
    - "301"
    - "302"
    - "Target:"
  failure_patterns:
    - "Error"
    - "Connection refused"
  severity_indicators:
    high:
      - "admin"
      - "backup"
      - ".env"
      - "config"
    medium:
      - "login"
      - "api"
      - "dashboard"
    low:
      - "200"
      - "301"

chain_suggestions:
  before:
    - "httpx"
  after:
    - "nuclei"

enabled: true
