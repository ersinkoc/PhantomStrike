name: gau
version: "1.0"
category: web/reconnaissance
phase: reconnaissance
command: gau
docker:
  image: ghcr.io/lc/gau:latest
  args:
    - "${target}"
    - "--json"
    - "--o"
    - "/output/gau-urls.json"
  memory_limit: "512m"
  timeout: "600s"

short_description: GetAllUrls - Fetch known URLs
description: |
  gau fetches known URLs from AlienVault's Open Threat Exchange,
  the Wayback Machine, Common Crawl, and URLScan.

parameters:
  - name: target
    type: string
    required: true
    description: Target domain

output:
  format: json

enabled: true
