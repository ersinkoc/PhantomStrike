name: katana
version: "1.0"
category: web/crawling
phase: reconnaissance
command: katana
docker:
  image: projectdiscovery/katana:latest
  args:
    - "-u"
    - "${target}"
    - "-o"
    - "/output/katana-results.txt"
    - "-d"
    - "5"
    - "-jc"
  memory_limit: "1g"
  timeout: "600s"

short_description: Next-gen web crawler
description: |
  Katana is a next-generation crawling and spidering framework.
  Built by ProjectDiscovery.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: depth
    type: integer
    required: false
    default: 5

output:
  format: text

enabled: true
