name: ffuf
version: "1.0"
category: web/fuzzing
phase: scanning
command: ffuf
args: []

short_description: Fast web fuzzer for directory and parameter discovery
description: |
  Ffuf is a fast web fuzzer written in Go that allows fuzzing of web applications
  to discover directories, files, parameters, and virtual hosts. It supports
  multiple wordlists, filters, and matchers for flexible fuzzing.
notes: |
  - Runs in process mode (no Docker) - requires ffuf installed locally
  - Use FUZZ keyword in URL for fuzz position
  - Use -w for wordlist, -mc for match codes, -fc for filter codes
  - Use -t for threads (default: 40)
  - Use -e for extensions (e.g. -e .php,.txt,.html)

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-mc 200,204,301,302,307,401,403,405 -t 40"
    description: "Raw ffuf flags (e.g. -w /usr/share/wordlists/common.txt -mc 200,301 -t 50)"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL with FUZZ keyword (e.g. http://target.com/FUZZ)"

output:
  format: text
  success_patterns:
    - "Status:"
    - "Size:"
    - "\\[Status:"
  failure_patterns:
    - "error"
    - "No matches"
  severity_indicators:
    high:
      - "admin"
      - "backup"
      - "config"
      - ".env"
    medium:
      - "login"
      - "dashboard"
      - "api"
    low:
      - "Status: 200"
      - "Status: 301"

chain_suggestions:
  before:
    - httpx
  after:
    - nuclei

enabled: true
