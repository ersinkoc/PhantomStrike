name: ffuf
version: "1.0"
category: web/fuzzing
phase: scanning
command: ffuf
docker:
  image: ep1nep1/ffuf:latest
  args:
    - "-u"
    - "${target}/FUZZ"
    - "-w"
    - "/wordlists/common.txt"
    - "-json"
    - "-o"
    - "/output/ffuf-results.json"
    - "-t"
    - "40"
    - "-mc"
    - "200,204,301,302,307,401,403,405"
  memory_limit: "512m"
  timeout: "600s"

short_description: Fast web fuzzer for directory discovery
description: |
  Ffuf is a fast web fuzzer written in Go that allows fuzzing of web applications
  to discover directories, files, parameters, and virtual hosts.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL with FUZZ keyword
  - name: wordlist
    type: string
    required: false
    description: Wordlist file path
  - name: method
    type: string
    required: false
    default: "GET"
    description: HTTP method
  - name: extensions
    type: string
    required: false
    description: File extensions (e.g., php,txt,html)

output:
  format: json
  success_patterns:
    - "results"

chain_suggestions:
  before:
    - httpx
  after:
    - nuclei

enabled: true
