name: ffuf
version: "1.0"
category: web/fuzzing
phase: scanning
command: ffuf
args: ["-noninteractive"]

docker:
  image: phantomstrike/ffuf:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Fast web fuzzer for directory and parameter discovery
description: |
  Ffuf is a fast web fuzzer written in Go that allows fuzzing of web applications
  to discover directories, files, parameters, and virtual hosts. It supports
  multiple wordlists, filters, and matchers for flexible fuzzing.
notes: |
  - Use FUZZ keyword in URL for fuzz position
  - Use wordlist for the wordlist path
  - Use match_code for match codes, filter_code for filter codes
  - Use threads for concurrency (default: 40)
  - Use extensions for file extensions (e.g. .php,.txt,.html)

parameters:
  - name: wordlist
    type: string
    required: false
    flag: "-w"
    default: "/usr/share/dirb/wordlists/common.txt"
    description: "Path to wordlist file"
  - name: match_code
    type: string
    required: false
    flag: "-mc"
    default: "200,204,301,302,307,401,403,405"
    description: "Match HTTP status codes"
  - name: filter_code
    type: string
    required: false
    flag: "-fc"
    description: "Filter HTTP status codes"
  - name: filter_size
    type: string
    required: false
    flag: "-fs"
    description: "Filter response size"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "40"
    description: "Number of concurrent threads"
  - name: extensions
    type: string
    required: false
    flag: "-e"
    description: "Comma-separated list of extensions (e.g. .php,.txt,.html)"
  - name: recursion
    type: bool
    required: false
    flag: "-recursion"
    default: false
    description: "Enable recursive scanning"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL with FUZZ keyword (e.g. http://target.com/FUZZ)"

output:
  format: text
  success_patterns:
    - "Status:"
    - "Size:"
    - "\\[Status:"
  failure_patterns:
    - "error"
    - "No matches"
  severity_indicators:
    high:
      - "admin"
      - "backup"
      - "config"
      - ".env"
    medium:
      - "login"
      - "dashboard"
      - "api"
    low:
      - "Status: 200"
      - "Status: 301"

chain_suggestions:
  before:
    - httpx
  after:
    - nuclei

enabled: true
