name: gdb-peda
version: "1.0"
category: binary/debugging
phase: analysis
command: python3
args:
  - "/app/tools/_custom/gdb-peda-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "1g"
  timeout: "300s"

short_description: GDB with PEDA
description: |
  PEDA (Python Exploit Development Assistance) is a GDB plugin.

parameters:
  - name: binary
    type: string
    required: true

output:
  format: text

enabled: true
