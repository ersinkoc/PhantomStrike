name: binwalk
version: "1.0"
category: binary/firmware-analysis
phase: analysis
command: binwalk
docker:
  image: kalilinux/binwalk:latest
  args:
    - "-e"
    - "-M"
    - "-C"
    - "/output/binwalk"
    - "/input/firmware"
  memory_limit: "2g"
  timeout: "1800s"

short_description: Firmware analysis tool
description: |
  Binwalk is a fast, easy to use tool for analyzing, reverse engineering,
  and extracting firmware images.

parameters:
  - name: firmware
    type: string
    required: true
    description: Firmware file

output:
  format: directory

enabled: true
