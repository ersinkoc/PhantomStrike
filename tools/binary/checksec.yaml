name: checksec
version: "1.0"
category: binary/security-checks
phase: analysis
command: checksec
args: ["--json"]

docker:
  image: phantomstrike/checksec:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: Binary security checker
description: |
  checksec.sh is a bash script to check executable properties.
  It checks for PIE, RELRO, NX, CANARY, and FORTIFY.
  This is an offline tool that operates on local binary files.
notes: |
  - Syntax: checksec --file=<binary> [options]

parameters:
  - name: target
    type: string
    required: true
    flag: "--file"
    description: "Path to binary file to check (offline tool — provide file path)"

output:
  format: json

enabled: true
