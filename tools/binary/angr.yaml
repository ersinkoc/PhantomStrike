name: angr
version: "1.0"
category: binary/symbolic-execution
phase: analysis
command: python3

docker:
  image: phantomstrike/python3:latest
  memory_limit: "4g"
  timeout: "1800s"

short_description: Binary analysis framework
description: |
  angr is a python framework for analyzing binaries.
  It combines both static and dynamic symbolic analysis.
  This is an offline tool that operates on local script files.
notes: |
  - Syntax: python3 <script.py>
  - Script path is a positional argument

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Path to Python analysis script (offline tool — provide file path)"

output:
  format: text

enabled: true
