name: ropper
version: "1.0"
category: binary/rop-finder
phase: analysis
command: ropper
docker:
  image: kalilinux/ropper:latest
  args:
    - "--file"
    - "/input/binary"
    - "--chain"
    - "execve"
  memory_limit: "1g"
  timeout: "300s"

short_description: ROP gadget finder and binary info
description: |
  Ropper lets you show information about binary files and find
  gadgets to build rop chains.

parameters:
  - name: binary
    type: string
    required: true
    description: Binary file

output:
  format: text

enabled: true
