name: sqlmap
version: "1.0"
category: database/injection
phase: exploitation
command: sqlmap
docker:
  image: paoloo/sqlmap:latest
  args:
    - "-u"
    - "${target}"
    - "--batch"
    - "--dump-all"
    - "--output-dir=/output/sqlmap"
  memory_limit: "1g"
  timeout: "1800s"

short_description: Automatic SQL injection tool
description: |
  sqlmap is an open source penetration testing tool that automates the process
  of detecting and exploiting SQL injection flaws.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: level
    type: integer
    required: false
    default: 1
  - name: risk
    type: integer
    required: false
    default: 1

output:
  format: text

enabled: true
