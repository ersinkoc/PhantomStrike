name: oscanner
version: "1.0"
category: database/oracle-scanning
phase: scanning
command: oscanner
docker:
  image: phantomstrike/oscanner:latest
  args:
    - "-s"
    - "${target}"
  memory_limit: "512m"
  timeout: "300s"

short_description: Oracle assessment tool
description: |
  Oscanner is an Oracle assessment framework developed in Java.
  It has a plugin-based architecture.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP

output:
  format: text

enabled: true
