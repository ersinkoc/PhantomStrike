name: objdump
version: "1.0"
category: binary/disassembly
phase: analysis
command: objdump
docker:
  image: kalilinux/binutils:latest
  args:
    - "-d"
    - "/input/binary"
    - ">"
    - "/output/objdump-results.txt"
  memory_limit: "512m"
  timeout: "300s"

short_description: Binary disassembler
description: |
  objdump displays information about object files.

parameters:
  - name: binary
    type: string
    required: true

output:
  format: text

enabled: true
