name: arp-scan
version: "1.0"
category: network/arp-scanning
phase: reconnaissance
command: arp-scan
args: ["-l"]

docker:
  image: phantomstrike/arp-scan:latest
  memory_limit: "256m"
  timeout: "300s"

short_description: ARP scanning tool
description: |
  arp-scan sends ARP packets to hosts on the local network and displays
  any responses.
notes: |
  - Syntax: arp-scan -l <network_range>
  - Network range is a positional argument
  - Requires privileged mode for raw packet access

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Network range to scan (e.g. 192.168.1.0/24)"

output:
  format: text

enabled: true
