name: ike-scan
version: "1.0"
category: network/vpn-scanning
phase: scanning
command: ike-scan
docker:
  image: phantomstrike/ike-scan:latest
  args:
    - "-M"
    - "${target}"
    - "--showbackoff"
  memory_limit: "256m"
  timeout: "300s"

short_description: IKE/IPSec VPN scanner
description: |
  ike-scan discovers and fingerprints IKE hosts using IKE/IPSec protocols.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP

output:
  format: text

enabled: true
