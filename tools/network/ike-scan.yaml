name: ike-scan
version: "1.0"
category: network/vpn-scanning
phase: scanning
command: ike-scan
args: ["-M", "--showbackoff"]

docker:
  image: phantomstrike/ike-scan:latest
  memory_limit: "256m"
  timeout: "300s"

short_description: IKE/IPSec VPN scanner
description: |
  ike-scan discovers and fingerprints IKE hosts using IKE/IPSec protocols.
notes: |
  - Syntax: ike-scan [options] <target>
  - Target IP is a positional argument

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target IP address or range to scan"

output:
  format: text

enabled: true
