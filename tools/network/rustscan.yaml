name: rustscan
version: "1.0"
category: network/port-scanning
phase: reconnaissance
command: rustscan
args:
  - "-a"
  - "${target}"
  - "-b"
  - "1500"
  - "--range"
  - "1-65535"
docker:
  image: phantomstrike/rustscan:latest
  memory_limit: "1g"
  timeout: "600s"

short_description: Modern port scanner
description: |
  RustScan is a modern port scanner that's faster than nmap.
  It can scan all 65k ports in seconds.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP/CIDR

output:
  format: text

enabled: true
