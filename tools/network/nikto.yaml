name: nikto
version: "1.0"
category: web/vulnerability-scanning
phase: scanning
command: nikto
args: []

short_description: Web server scanner
description: |
  Nikto is an Open Source web server scanner which performs comprehensive tests
  against web servers for multiple items including dangerous files/CGIs.
notes: |
  - Runs in process mode (no Docker) - requires nikto installed locally
  - Uses -ask no for non-interactive mode
  - Nikto is noisy by design

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-ask no"
    description: "Raw nikto flags (e.g. -ask no -ssl -p 443)"
  - name: target
    type: string
    required: true
    flag: "-h"
    description: "Target URL or IP"

output:
  format: text
  success_patterns:
    - "\\+ Target IP:"
    - "\\+ Server:"
  failure_patterns:
    - "ERROR"
    - "No web server found"

chain_suggestions:
  before:
    - nmap

enabled: true
