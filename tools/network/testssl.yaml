name: testssl-network
version: "1.0"
category: network/ssl-testing
phase: scanning
command: testssl.sh
args: ["--quiet", "--color=0"]

docker:
  image: drwetter/testssl.sh:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: SSL/TLS security testing
description: |
  Testing TLS/SSL encryption. Checks for vulnerable protocols, cipher suites,
  certificate issues, and common vulnerabilities like Heartbleed, POODLE, DROWN.
notes: |
  - Runs all tests by default; use specific flags for targeted checks
  - --quiet reduces output noise, --color 0 for clean non-colored output
  - Use --ip one to test only one IP for multi-homed hosts

parameters:
  - name: full
    type: bool
    required: false
    flag: "--full"
    default: false
    description: "Run all checks including less common tests"
  - name: protocols
    type: bool
    required: false
    flag: "-p"
    default: false
    description: "Check TLS/SSL protocols only"
  - name: vulnerabilities
    type: bool
    required: false
    flag: "-U"
    default: false
    description: "Test for all vulnerabilities"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target host:port (e.g. example.com:443)"

output:
  format: text
  success_patterns:
    - "Testing"
    - "Done"
    - "not vulnerable"
  failure_patterns:
    - "Fatal error"
    - "Cannot connect"
  severity_indicators:
    critical:
      - "VULNERABLE"
      - "Heartbleed"
      - "DROWN"
    high:
      - "POODLE"
      - "BEAST"
      - "FREAK"

enabled: true
