name: nmap
version: "1.0"
category: network/port-scanning
phase: reconnaissance
command: nmap
docker:
  image: instrumentisto/nmap:latest
  args:
    - "-sS"
    - "-sV"
    - "-O"
    - "--script=vulners"
    - "-p-"
    - "${target}"
    - "-oX"
    - "/output/nmap-results.xml"
  memory_limit: "512m"
  timeout: "1800s"

short_description: Network discovery and security auditing
description: |
  Nmap is a free and open source utility for network discovery and security auditing.
  It uses raw IP packets to determine what hosts are available on the network,
  what services those hosts are offering, and more.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP, hostname, or network
  - name: ports
    type: string
    required: false
    default: "1-65535"
    description: Port range to scan
  - name: scan-type
    type: string
    required: false
    default: "sS"
    enum: [sS, sT, sU, sV]
    description: Scan type

output:
  format: xml
  success_patterns:
    - "host"
  failure_patterns:
    - "failed"

chain_suggestions:
  before:
    - masscan
  after:
    - nuclei

enabled: true
