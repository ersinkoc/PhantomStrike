name: nmap
version: "1.0"
category: network/port-scanning
phase: reconnaissance
command: nmap
args: []

docker:
  image: instrumentisto/nmap:latest
  memory_limit: "512m"
  timeout: "600s"

short_description: Network discovery and security auditing
description: |
  Nmap is a free and open source utility for network discovery and security auditing.
  Uses raw IP packets to determine hosts, services, OS, and vulnerabilities.
notes: |
  - The 'flags' parameter accepts raw nmap flags like -sV -sS -O -A
  - Target goes as positional argument at the end

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-sV -T4"
    description: "Raw nmap flags (e.g. -sV -sS -O -p 80,443 -A)"
  - name: target
    type: string
    required: true
    description: "Target IP, hostname, or CIDR range"

output:
  format: text
  success_patterns:
    - "Nmap scan report"
    - "open"
    - "Host is up"
  failure_patterns:
    - "failed to resolve"
    - "No targets were specified"
  severity_indicators:
    high:
      - "VULNERABLE"
      - "CVE-"
    medium:
      - "open"

chain_suggestions:
  after:
    - nuclei
    - nikto

enabled: true
