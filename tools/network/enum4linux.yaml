name: enum4linux
version: "1.0"
category: network/smb-enum
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/enum4linux-lite.py"]
docker:
  image: phantomstrike/enum4linux:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: SMB enumeration tool
description: |
  SMB enumeration using smbclient and rpcclient to list shares,
  users, groups, and check access permissions.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP address

output:
  format: text

enabled: true
