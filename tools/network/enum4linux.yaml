name: enum4linux
version: "1.0"
category: network/smb-enum
phase: reconnaissance
command: enum4linux
docker:
  image: tuxpoldo/enum4linux:latest
  args:
    - "-a"
    - "${target}"
  memory_limit: "512m"
  timeout: "600s"

short_description: SMB enumeration tool
description: |
  enum4linux is a tool for enumerating information from Windows and Samba
  systems through SMB/CIFS.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP

output:
  format: text

enabled: true
