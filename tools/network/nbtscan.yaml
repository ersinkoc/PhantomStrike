name: nbtscan
version: "1.0"
category: network/netbios-scanning
phase: reconnaissance
command: nbtscan
args: ["-r", "-v"]

docker:
  image: phantomstrike/nbtscan:latest
  memory_limit: "256m"
  timeout: "300s"

short_description: NetBIOS name scanner
description: |
  nbtscan is a program for scanning IP networks for NetBIOS name information.
notes: |
  - Syntax: nbtscan [options] <network_range>
  - Network range is a positional argument

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Network range to scan (e.g. 192.168.1.0/24)"

output:
  format: text

enabled: true
