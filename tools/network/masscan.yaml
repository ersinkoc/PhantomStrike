name: masscan
version: "1.0"
category: network/port-scanning
phase: reconnaissance
command: masscan
docker:
  image: adamlamar/masscan:latest
  args:
    - "${target}"
    - "-p${ports}"
    - "--rate"
    - "${rate}"
    - "-oJ"
    - "/output/masscan-results.json"
  memory_limit: "512m"
  timeout: "600s"
  privileged: true

short_description: Internet-scale port scanner
description: |
  Masscan is an Internet-scale port scanner. It can scan the entire Internet
  in under 6 minutes, transmitting 10 million packets per second.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP or CIDR range
  - name: ports
    type: string
    required: false
    default: "1-65535"
    description: Ports to scan
  - name: rate
    type: integer
    required: false
    default: 10000
    description: Packets per second rate

output:
  format: json
  success_patterns:
    - "ports"

chain_suggestions:
  after:
    - nmap

enabled: true
