name: cewl
version: "1.0"
category: password/wordlist-generator
phase: reconnaissance
command: cewl
args: ["-w", "/output/cewl-wordlist.txt"]

docker:
  image: phantomstrike/cewl:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Custom wordlist generator
description: |
  CeWL (Custom Word List generator) is a ruby app which spiders a
  given URL and creates a word list.
notes: |
  - Syntax: cewl <url> [options]
  - URL is a positional argument (no flag)

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL to spider (e.g. http://example.com)"
  - name: depth
    type: string
    required: false
    flag: "-d"
    default: "2"
    description: "Depth to spider (default 2)"
  - name: min_word_length
    type: string
    required: false
    flag: "-m"
    default: "6"
    description: "Minimum word length (default 6)"

output:
  format: text

enabled: true
