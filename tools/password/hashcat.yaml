name: hashcat
version: "1.0"
category: password/cracking
phase: exploitation
command: hashcat
docker:
  image: phantomstrike/hashcat:latest
  args:
    - "-m"
    - "${hash_type}"
    - "-a"
    - "0"
    - "/input/hashes.txt"
    - "/wordlists/rockyou.txt"
    - "-o"
    - "/output/cracked.txt"
  memory_limit: "4g"
  timeout: "3600s"
  privileged: true
  devices: ["/dev/dri:/dev/dri"]

short_description: Advanced password recovery
description: |
  Hashcat is the world's fastest password recovery tool supporting 300+ hash types.

parameters:
  - name: hash_type
    type: integer
    required: true
    description: Hash type (0=MD5, 100=SHA1, etc.)
  - name: hashes
    type: string
    required: true
    description: Hash file
  - name: attack_mode
    type: integer
    required: false
    default: 0
    description: Attack mode (0=dictionary, 3=brute-force)

output:
  format: text

enabled: true
