name: hashcat
version: "1.0"
category: password/cracking
phase: exploitation
command: hashcat
args: ["-o", "/output/cracked.txt"]

docker:
  image: phantomstrike/hashcat:latest
  memory_limit: "4g"
  timeout: "3600s"

short_description: Advanced password recovery
description: |
  Hashcat is the world's fastest password recovery tool supporting 300+ hash types.
  This is an offline tool that operates on local hash files, not remote targets.
notes: |
  - Syntax: hashcat -m <type> -a <mode> <hashfile> <wordlist> [options]
  - This is an offline cracking tool — target is a file path, not a hostname
  - Hash file must be mounted into the container at /input/

parameters:
  - name: hash_type
    type: string
    required: true
    flag: "-m"
    description: "Hash type (0=MD5, 100=SHA1, 1000=NTLM, 1800=SHA-512, etc.)"
  - name: attack_mode
    type: string
    required: false
    flag: "-a"
    default: "0"
    description: "Attack mode (0=dictionary, 1=combination, 3=brute-force, 6=hybrid)"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Path to hash file and wordlist as positional args (offline tool — provide file paths, not hostname). Example: '/input/hashes.txt /wordlists/rockyou.txt'"

output:
  format: text

enabled: true
