name: hydra
version: "1.0"
category: password/brute-force
phase: exploitation
command: hydra
docker:
  image: vanhauser/hydra:latest
  args:
    - "-l"
    - "${username}"
    - "-P"
    - "/wordlists/passwords.txt"
    - "-t"
    - "16"
    - "${target}"
    - "${protocol}"
  memory_limit: "512m"
  timeout: "1800s"

short_description: Network login cracker
description: |
  Hydra is a parallelized login cracker which supports numerous protocols.

parameters:
  - name: target
    type: string
    required: true
    description: Target host
  - name: protocol
    type: string
    required: true
    enum: [ssh, ftp, rdp, mysql, mssql, postgres, smb, http-post-form]
  - name: username
    type: string
    required: true
    description: Username or list
  - name: wordlist
    type: string
    required: false
    description: Password wordlist

output:
  format: text

enabled: true
