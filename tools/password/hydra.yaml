name: hydra
version: "1.0"
category: password/brute-force
phase: exploitation
command: hydra
args: ["-f"]

docker:
  image: vanhauser/hydra:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Fast and flexible network login cracker
description: |
  Hydra is a parallelized login cracker which supports numerous protocols
  including SSH, FTP, RDP, MySQL, MSSQL, PostgreSQL, SMB, HTTP, and more.
  It is one of the most widely used tools for brute-force password attacks.
notes: |
  - Syntax: hydra [options] target protocol
  - Use username for single username, userlist for username file
  - Use password for single password, passlist for password file
  - Use -f to stop on first valid password found (set in args)
  - Target and service are positional args at the end (target service)

parameters:
  - name: username
    type: string
    required: false
    flag: "-l"
    description: "Single username to test"
  - name: userlist
    type: string
    required: false
    flag: "-L"
    description: "File containing list of usernames"
  - name: password
    type: string
    required: false
    flag: "-p"
    description: "Single password to test"
  - name: passlist
    type: string
    required: false
    flag: "-P"
    default: "/usr/share/wordlists/rockyou.txt"
    description: "File containing list of passwords"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "16"
    description: "Number of parallel tasks"
  - name: verbose
    type: bool
    required: false
    flag: "-V"
    default: false
    description: "Verbose mode, show each login attempt"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target and service (e.g. '192.168.1.1 ssh' or 'ssh://192.168.1.1')"

output:
  format: text
  success_patterns:
    - "login:"
    - "password:"
    - "valid password"
    - "host:"
  failure_patterns:
    - "0 valid passwords found"
    - "Error"
    - "could not connect"
  severity_indicators:
    critical:
      - "login:"
      - "valid password"
    high:
      - "password:"

chain_suggestions:
  before:
    - "nmap"
  after: []

enabled: true
