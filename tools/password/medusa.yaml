name: medusa
version: "1.0"
category: password/brute-force
phase: exploitation
command: medusa

docker:
  image: phantomstrike/medusa:latest
  memory_limit: "512m"
  timeout: "1800s"

short_description: Parallel network login auditor
description: |
  Medusa is a speedy, parallel, and modular, login brute-forcer.
  The goal is to support as many services as possible.
notes: |
  - Syntax: medusa -h <host> -u <user> -P <passfile> -M <module>
  - Target host uses the -h flag

parameters:
  - name: target
    type: string
    required: true
    flag: "-h"
    description: "Target host (IP or hostname)"
  - name: username
    type: string
    required: false
    flag: "-u"
    description: "Single username to test"
  - name: userlist
    type: string
    required: false
    flag: "-U"
    description: "File containing list of usernames"
  - name: password
    type: string
    required: false
    flag: "-p"
    description: "Single password to test"
  - name: passlist
    type: string
    required: false
    flag: "-P"
    default: "/wordlists/passwords.txt"
    description: "File containing list of passwords"
  - name: module
    type: string
    required: true
    flag: "-M"
    description: "Protocol module (ssh, ftp, http, telnet, mysql, etc.)"
  - name: threads
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Number of parallel login attempts"

output:
  format: text

enabled: true
