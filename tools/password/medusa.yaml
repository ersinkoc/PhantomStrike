name: medusa
version: "1.0"
category: password/brute-force
phase: exploitation
command: medusa
docker:
  image: phantomstrike/medusa:latest
  args:
    - "-h"
    - "${target}"
    - "-u"
    - "${username}"
    - "-P"
    - "/wordlists/passwords.txt"
    - "-M"
    - "${protocol}"
  memory_limit: "512m"
  timeout: "1800s"

short_description: Parallel network login auditor
description: |
  Medusa is a speedy, parallel, and modular, login brute-forcer.
  The goal is to support as many services as possible.

parameters:
  - name: target
    type: string
    required: true
    description: Target host
  - name: username
    type: string
    required: true
    description: Username
  - name: protocol
    type: string
    required: true
    description: Protocol module (ssh, ftp, http, etc.)

output:
  format: text

enabled: true
