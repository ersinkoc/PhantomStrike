name: fofa
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/fofa-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Internet asset search using free public APIs
description: |
  FOFA-lite searches for exposed internet assets using free public APIs
  including Shodan InternetDB, crt.sh, HackerTarget, and urlscan.io.
  Identifies open ports, services, CVEs, and certificates.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Domain or IP to search"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "15"
    description: "Request timeout"
  - name: probe
    type: bool
    required: false
    flag: "--probe"
    default: false
    description: "Probe discovered IPs for open services"

output:
  format: text

chain_suggestions:
  after:
    - "nmap"
    - "nuclei"

enabled: true
