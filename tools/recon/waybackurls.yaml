name: waybackurls
version: "1.0"
category: reconnaissance/url-discovery
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/waybackurls.py"]
docker:
  image: phantomstrike/waybackurls:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: Fetch URLs from Wayback Machine
description: |
  Fetches all archived URLs from the Wayback Machine CDX API
  for a given domain including subdomains.

parameters:
  - name: target
    type: string
    required: true
    description: Target domain

output:
  format: text

enabled: true
