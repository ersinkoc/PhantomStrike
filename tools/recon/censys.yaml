name: censys
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: censys
args: ["search", "--index-type", "hosts", "-f", "json"]

docker:
  image: phantomstrike/censys:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Attack surface discovery
description: |
  Censys helps organizations secure their networks by providing an accurate
  and up-to-date view of their internet-facing assets.
notes: |
  - Syntax: censys search <query> [options]
  - Query is a positional argument after the subcommand

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Censys search query (e.g. 'services.port=443 and location.country=US')"

output:
  format: json

enabled: true
