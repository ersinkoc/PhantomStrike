name: whois-lookup
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/whois-lookup.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: WHOIS lookup and IP geolocation
description: |
  Performs WHOIS lookups for domains and IP addresses. Retrieves registrar
  information, creation/expiry dates, nameservers, and registrant details.
  Also resolves IPs and provides geolocation and ASN information.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target domain or IP address"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Query timeout in seconds"
  - name: raw
    type: bool
    required: false
    flag: "--raw"
    default: false
    description: "Show raw WHOIS response"

output:
  format: text

chain_suggestions:
  before: []
  after:
    - "dns-recon"
    - "subfinder"

enabled: true
