name: subfinder
version: "1.0"
category: reconnaissance/subdomain
phase: reconnaissance
command: subfinder
docker:
  image: projectdiscovery/subfinder:latest
  args:
    - "-d"
    - "${domain}"
    - "-o"
    - "/output/subfinder-results.txt"
  memory_limit: "512m"
  timeout: "300s"

short_description: Subdomain discovery tool
description: |
  Subfinder is a subdomain discovery tool that discovers valid
  subdomains for websites.

parameters:
  - name: domain
    type: string
    required: true

output:
  format: text

enabled: true
