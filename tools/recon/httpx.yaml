name: httpx
version: "1.0"
category: recon/http
phase: reconnaissance
command: httpx
args: ["-silent", "-nc"]

docker:
  image: projectdiscovery/httpx:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Fast multi-purpose HTTP toolkit for probing and web server fingerprinting
description: |
  httpx is a fast and multi-purpose HTTP toolkit by ProjectDiscovery that allows
  running multiple probes using the retryablehttp library. It is designed to
  maintain result reliability with an increased number of threads. httpx can
  probe a list of hosts, extract status codes, content lengths, page titles,
  server headers, technology stacks, TLS certificate information, and more.
notes: |
  - httpx reads targets from stdin or a file (-l), or a single target with -u.
  - Common pipeline: subfinder -d target.com | httpx -title -tech-detect -status-code
  - Use -match-code and -filter-code to focus on specific HTTP response codes.
  - Technology detection (-tech-detect) uses Wappalyzer signatures.

parameters:
  - name: status_code
    type: bool
    required: false
    flag: "-status-code"
    default: true
    description: "Display response status code"
  - name: title
    type: bool
    required: false
    flag: "-title"
    default: true
    description: "Display page title"
  - name: tech_detect
    type: bool
    required: false
    flag: "-tech-detect"
    default: true
    description: "Display technology in use based on Wappalyzer"
  - name: follow_redirects
    type: bool
    required: false
    flag: "-follow-redirects"
    default: false
    description: "Follow HTTP redirects"
  - name: threads
    type: string
    required: false
    flag: "-threads"
    default: "50"
    description: "Number of threads"
  - name: match_code
    type: string
    required: false
    flag: "-match-code"
    description: "Match response with specific status code (e.g. 200,301,302)"
  - name: filter_code
    type: string
    required: false
    flag: "-filter-code"
    description: "Filter response with specific status code (e.g. 404,500)"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL or host to probe"

output:
  format: text
  success_patterns:
    - "http"
    - "\\[200\\]"
    - "\\[301\\]"
    - "\\[302\\]"
  failure_patterns:
    - "could not connect"
    - "no addresses found"
    - "context deadline exceeded"
  severity_indicators:
    critical:
      - "Jenkins"
      - "Tomcat Manager"
      - "phpMyAdmin"
    high:
      - "WordPress"
      - "Joomla"
      - "Drupal"
    medium:
      - "Apache/2.2"
      - "PHP/5"
    low:
      - "\\[200\\]"
      - "\\[301\\]"

chain_suggestions:
  before:
    - "subfinder"
    - "amass"
    - "nmap"
  after:
    - "nuclei"
    - "nikto"
    - "ffuf"
    - "gobuster"

enabled: true
