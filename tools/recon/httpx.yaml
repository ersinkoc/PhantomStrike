name: httpx
version: "1.0"
category: recon/http
phase: reconnaissance
command: httpx
args: []

docker:
  image: projectdiscovery/httpx:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Fast multi-purpose HTTP toolkit for probing and web server fingerprinting
description: |
  httpx is a fast and multi-purpose HTTP toolkit by ProjectDiscovery that allows
  running multiple probes using the retryablehttp library. It is designed to
  maintain result reliability with an increased number of threads. httpx can
  probe a list of hosts, extract status codes, content lengths, page titles,
  server headers, technology stacks, TLS certificate information, and more.
notes: |
  - httpx reads targets from stdin or a file (-l), or a single target with -u.
  - Common pipeline: subfinder -d target.com | httpx -title -tech-detect -status-code
  - Use -match-code and -filter-code to focus on specific HTTP response codes.
  - Technology detection (-tech-detect) uses Wappalyzer signatures.

parameters:
  - name: flags
    type: string
    required: false
    flag: ""
    default: "-silent -status-code -title -tech-detect -nc"
    description: "Raw httpx flags (e.g. -status-code -title -tech-detect -follow-redirects)"
  - name: target
    type: string
    required: true
    flag: "-u"
    description: "Target URL or host to probe"

output:
  format: text
  success_patterns:
    - "http"
    - "\\[200\\]"
    - "\\[301\\]"
    - "\\[302\\]"
  failure_patterns:
    - "could not connect"
    - "no addresses found"
    - "context deadline exceeded"
  severity_indicators:
    critical:
      - "Jenkins"
      - "Tomcat Manager"
      - "phpMyAdmin"
    high:
      - "WordPress"
      - "Joomla"
      - "Drupal"
    medium:
      - "Apache/2.2"
      - "PHP/5"
    low:
      - "\\[200\\]"
      - "\\[301\\]"

chain_suggestions:
  before:
    - "subfinder"
    - "amass"
    - "nmap"
  after:
    - "nuclei"
    - "nikto"
    - "ffuf"
    - "gobuster"

enabled: true
