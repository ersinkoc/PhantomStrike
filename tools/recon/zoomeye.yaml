name: zoomeye
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/zoomeye-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Service fingerprinting via banner grabbing
description: |
  ZoomEye-lite performs service fingerprinting by connecting to open ports,
  grabbing service banners, and identifying service types and versions.
  Supports HTTP fingerprinting and SSL/TLS info extraction.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target IP or hostname"
  - name: ports
    type: string
    required: false
    flag: "-p"
    description: "Ports to scan (e.g., 80,443,8080)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "3"
    description: "Connection timeout"
  - name: deep
    type: bool
    required: false
    flag: "--deep"
    default: false
    description: "Deep fingerprinting (slower)"

output:
  format: text

chain_suggestions:
  before:
    - "port-scanner"
  after:
    - "nuclei"

enabled: true
