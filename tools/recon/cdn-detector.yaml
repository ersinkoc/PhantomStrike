name: cdn-detector
version: "1.0"
category: reconnaissance/infrastructure
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/cdn-detector.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "120s"

short_description: CDN/WAF detector and origin IP finder
description: |
  Detects CDN and WAF presence by analyzing HTTP response headers, DNS
  CNAME records, and response behavior to malicious payloads. Attempts
  to discover real origin IPs behind the CDN using MX records, subdomain
  enumeration, and alternative DNS sources.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target domain or URL"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"
  - name: deep
    type: bool
    required: false
    flag: "--deep"
    default: false
    description: "Deep scan for real origin IP"

output:
  format: text

chain_suggestions:
  before:
    - "httpx"
  after:
    - "wafw00f"

enabled: true
