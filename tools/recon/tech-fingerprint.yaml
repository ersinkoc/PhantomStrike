name: tech-fingerprint
version: "1.0"
category: reconnaissance/fingerprinting
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/tech-fingerprint.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: Technology stack fingerprinter
description: |
  Fingerprints the technology stack of a target website by analyzing
  HTTP headers, cookies, HTML content, and JavaScript/CSS references.
  Detects CMS, frameworks, web servers, CDNs, and analytics tools.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target URL or domain"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout in seconds"

output:
  format: text

chain_suggestions:
  before:
    - "httpx"
  after:
    - "cve-lookup"
    - "nuclei"
    - "whatweb"

enabled: true
