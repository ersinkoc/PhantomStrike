name: shodan
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: shodan
docker:
  image: k0st/alpine-shodan:latest
  args:
    - "search"
    - "--fields=ip_str,port,hostnames"
    - "--format=json"
    - "${query}"
  memory_limit: "512m"
  timeout: "300s"

short_description: Shodan search engine
description: |
  Shodan is the world's first search engine for Internet-connected devices.
  Find exposed devices, open ports, and vulnerabilities.

parameters:
  - name: query
    type: string
    required: true
    description: Shodan search query
  - name: api_key
    type: string
    required: true
    description: Shodan API key

output:
  format: json

enabled: true
