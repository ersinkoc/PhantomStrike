name: shodan
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: shodan
args: ["search", "--fields=ip_str,port,hostnames", "--format=json"]

docker:
  image: phantomstrike/shodan:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Shodan search engine
description: |
  Shodan is the world's first search engine for Internet-connected devices.
  Find exposed devices, open ports, and vulnerabilities.
notes: |
  - Syntax: shodan search [options] <query>
  - Query is a positional argument
  - API key must be configured with 'shodan init <api_key>' before use

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Shodan search query (e.g. 'apache port:443 country:US')"

output:
  format: json

enabled: true
