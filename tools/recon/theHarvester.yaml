name: theharvester
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: theHarvester
docker:
  image: phantomstrike/theHarvester:latest
  args:
    - "-d"
    - "${domain}"
    - "-b"
    - "all"
    - "-f"
    - "/output/harvester-results"
  memory_limit: "1g"
  timeout: "600s"

short_description: OSINT email and subdomain discovery
description: |
  TheHarvester is a simple to use tool to gather emails, subdomains,
  hosts, employee names, open ports, and banners from different public sources.

parameters:
  - name: domain
    type: string
    required: true
    description: Domain to search
  - name: sources
    type: string
    required: false
    default: "all"
    description: Data sources (all, baidu, bing, etc.)

output:
  format: xml

enabled: false
