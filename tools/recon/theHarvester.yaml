name: theharvester
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/theharvester-lite.py"]
docker:
  image: phantomstrike/theHarvester:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: OSINT email and subdomain discovery
description: |
  Lightweight email and subdomain harvester using public sources
  including crt.sh, HackerTarget, and RapidDNS.

parameters:
  - name: domain
    type: string
    required: true
    description: Domain to search
  - name: sources
    type: string
    required: false
    default: "all"
    description: Data sources (all, crtsh, hackertarget, rapiddns)

output:
  format: text

enabled: true
