name: maltego
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: maltego
docker:
  image: maltego/maltego:latest
  args:
    - "-t"
    - "${target}"
    - "-o"
    - "/output/maltego-results"
  memory_limit: "2g"
  timeout: "600s"

short_description: OSINT and forensics platform
description: |
  Maltego is an interactive data mining tool that renders directed graphs
  for link analysis.

parameters:
  - name: target
    type: string
    required: true
    description: Target domain/IP

output:
  format: xml

enabled: true
