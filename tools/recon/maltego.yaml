name: maltego
version: "1.0"
category: reconnaissance/osint
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/maltego-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: OSINT data gatherer (DNS, WHOIS, subdomains, emails, social)
description: |
  Maltego-lite gathers OSINT data from public sources including DNS records,
  WHOIS info, subdomain enumeration via crt.sh, email discovery, and social
  media profile checks.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target domain (e.g., example.com)"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "10"
    description: "Request timeout"
  - name: skip_social
    type: bool
    required: false
    flag: "--skip-social"
    default: false
    description: "Skip social profile checks"
  - name: skip_emails
    type: bool
    required: false
    flag: "--skip-emails"
    default: false
    description: "Skip email harvesting"

output:
  format: text

chain_suggestions:
  after:
    - "subfinder"
    - "httpx"

enabled: true
