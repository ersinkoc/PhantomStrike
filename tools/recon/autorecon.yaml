name: autorecon
version: "1.0"
category: reconnaissance/automation
phase: reconnaissance
command: python3
args: ["/app/tools/_custom/autorecon-lite.py"]
docker:
  image: phantomstrike/custom:latest
  memory_limit: "512m"
  timeout: "600s"

short_description: Automated recon pipeline (port scan + HTTP probe + subdomain enum)
description: |
  AutoRecon-lite performs automated reconnaissance combining port scanning,
  HTTP service probing, and subdomain enumeration (DNS brute-force + crt.sh)
  in a single pipeline.

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target domain or IP"
  - name: timeout
    type: string
    required: false
    flag: "-t"
    default: "2"
    description: "Connection timeout"
  - name: skip_subdomains
    type: bool
    required: false
    flag: "--skip-subdomains"
    default: false
    description: "Skip subdomain enumeration"
  - name: skip_http
    type: bool
    required: false
    flag: "--skip-http"
    default: false
    description: "Skip HTTP probing"

output:
  format: text

chain_suggestions:
  after:
    - "nmap"
    - "nuclei"
    - "httpx"

enabled: true
