name: dnsrecon
version: "1.0"
category: reconnaissance/dns
phase: reconnaissance
command: dnsrecon
args: ["-t", "std,axfr", "-j", "/output/dnsrecon-results.json"]

docker:
  image: phantomstrike/dnsrecon:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: DNS enumeration tool
description: |
  DNSRecon is a Python script that provides the ability to perform DNS
  enumeration and validation.
notes: |
  - Syntax: dnsrecon -d <domain> [options]
  - Domain requires the -d flag

parameters:
  - name: target
    type: string
    required: true
    flag: "-d"
    description: "Target domain to enumerate (e.g. example.com)"

output:
  format: json

enabled: true
