name: amass
version: "1.0"
category: recon/subdomain
phase: reconnaissance
command: amass
args:
  - "enum"
  - "-passive"

docker:
  image: caffix/amass:latest
  memory_limit: "2048m"
  timeout: "300s"

short_description: In-depth attack surface mapping and subdomain enumeration
description: |
  Amass by OWASP performs network mapping of attack surfaces and external asset
  discovery using open-source information gathering and active reconnaissance
  techniques. It supports passive enumeration via certificate transparency logs,
  search engines, web archives, and API integrations with over 50 data sources.
notes: |
  - Amass has two main subcommands: 'enum' for enumeration and 'intel' for OSINT.
  - Passive mode (-passive) only queries third-party sources; no direct target interaction.
  - Active mode includes DNS resolution and zone transfer attempts against the target.
  - Brute force mode (-brute) performs DNS brute-forcing using built-in or custom wordlists.
  - Amass can be memory-intensive; allocate at least 2GB for large scans.

parameters:
  - name: timeout
    type: string
    required: false
    flag: "-timeout"
    default: "30"
    description: "Number of minutes to run enumeration"
  - name: active
    type: bool
    required: false
    flag: "-active"
    default: false
    description: "Enable active recon methods (DNS resolution, zone transfers)"
  - name: brute
    type: bool
    required: false
    flag: "-brute"
    default: false
    description: "Enable brute force subdomain enumeration"
  - name: target
    type: string
    required: true
    flag: "-d"
    description: "Target domain for enumeration (e.g. example.com)"

output:
  format: text
  success_patterns:
    - "Querying"
    - "\\."
    - "names discovered"
    - "OWASP"
  failure_patterns:
    - "The enumeration has finished"
    - "0 names discovered"
    - "Failed to"
    - "no names were discovered"
  severity_indicators:
    critical:
      - "admin\\."
      - "staging\\."
      - "internal\\."
      - "corp\\."
      - "intranet\\."
    high:
      - "vpn\\."
      - "mail\\."
      - "remote\\."
      - "jenkins\\."
      - "jira\\."
      - "gitlab\\."
    medium:
      - "api\\."
      - "dev\\."
      - "test\\."
      - "beta\\."
      - "uat\\."
    low:
      - "www\\."
      - "cdn\\."
      - "static\\."
      - "blog\\."

chain_suggestions:
  before: []
  after:
    - "httpx"
    - "nmap"
    - "nuclei"

enabled: true
