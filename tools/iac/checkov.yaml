name: checkov
version: "1.0"
category: iac/security
phase: scanning
command: checkov
args: ["-o", "json", "--quiet"]

docker:
  image: phantomstrike/checkov:latest
  memory_limit: "1g"
  timeout: "600s"

short_description: Infrastructure as Code security scanner
description: |
  Checkov scans Terraform, CloudFormation, Kubernetes, Dockerfile, and ARM templates
  for security and compliance misconfigurations. Includes 750+ built-in policies.
  This is an offline tool that operates on local IaC files.
notes: |
  - Syntax: checkov -d <directory> [options]

parameters:
  - name: target
    type: string
    required: true
    flag: "-d"
    description: "Directory containing IaC files to scan (offline tool — provide directory path)"
  - name: framework
    type: string
    required: false
    flag: "--framework"
    enum: [terraform, cloudformation, kubernetes, dockerfile, arm, serverless, ansible, helm]
    description: "IaC framework type"
  - name: skip_check
    type: string
    required: false
    flag: "--skip-check"
    description: "Checks to skip (comma-separated)"
  - name: severity
    type: string
    required: false
    flag: "--check"
    default: "HIGH,CRITICAL"
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
    description: "Minimum severity to report"

output:
  format: json
  success_patterns:
    - "passed"
  failure_patterns:
    - "failed"
    - "ERROR"
  severity_indicators:
    CRITICAL:
      - "\"severity\": \"CRITICAL\""
    HIGH:
      - "\"severity\": \"HIGH\""

chain_suggestions:
  before:
    - terraform-plan
  after:
    - tfsec
    - terrascan

enabled: true
