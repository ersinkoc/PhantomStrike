name: tfsec
version: "1.0"
category: iac/security
phase: scanning
command: python3
args:
  - "/app/tools/_custom/tfsec-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "1g"
  timeout: "300s"

short_description: Terraform static analysis security scanner
description: |
  Tfsec uses static analysis of your terraform code to spot potential
  misconfigurations and security issues.

parameters:
  - name: path
    type: string
    required: true
    description: Terraform code path
  - name: severity
    type: string
    required: false
    default: "HIGH,CRITICAL"
    flag: "--minimum-severity"

output:
  format: json
  severity_indicators:
    CRITICAL:
      - "CRITICAL"
    HIGH:
      - "HIGH"

chain_suggestions:
  before:
    - checkov

enabled: true
