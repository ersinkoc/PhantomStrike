name: tfsec
version: "1.0"
category: iac/security
phase: scanning
command: tfsec
docker:
  image: aquasec/tfsec:latest
  args:
    - "${path}"
    - "--format=json"
    - "--out=/output/tfsec-results.json"
  memory_limit: "1g"
  timeout: "300s"

short_description: Terraform static analysis security scanner
description: |
  Tfsec uses static analysis of your terraform code to spot potential
  misconfigurations and security issues.

parameters:
  - name: path
    type: string
    required: true
    description: Terraform code path
  - name: severity
    type: string
    required: false
    default: "HIGH,CRITICAL"

output:
  format: json
  severity_indicators:
    CRITICAL:
      - "CRITICAL"
    HIGH:
      - "HIGH"

chain_suggestions:
  before:
    - checkov

enabled: true
