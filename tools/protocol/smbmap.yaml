name: smbmap
version: "1.0"
category: protocol/smb-enumeration
phase: reconnaissance
command: smbmap
docker:
  image: phantomstrike/smbmap:latest
  args:
    - "-H"
    - "${target}"
    - "-R"
  memory_limit: "512m"
  timeout: "300s"

short_description: SMB share enumerator
description: |
  SMBMap is a handy SMB enumeration tool.

parameters:
  - name: target
    type: string
    required: true
    description: Target IP

output:
  format: text

enabled: false
