name: dnsenum
version: "1.0"
category: protocol/dns-enumeration
phase: reconnaissance
command: dnsenum
args: ["-o", "/output/dnsenum-results.xml", "--threads", "5"]

docker:
  image: phantomstrike/dnsenum:latest
  memory_limit: "512m"
  timeout: "600s"

short_description: DNS enumeration script
description: |
  Dnsenum is a perl script that enumerates DNS information from a domain.
  It performs host address lookups, nameserver lookups, MX record queries,
  zone transfer attempts, and subdomain brute-forcing.
notes: |
  - Syntax: dnsenum <domain> [options]
  - Domain is a positional argument (no flag)

parameters:
  - name: target
    type: string
    required: true
    flag: ""
    description: "Target domain to enumerate (e.g. example.com)"

output:
  format: xml

enabled: true
