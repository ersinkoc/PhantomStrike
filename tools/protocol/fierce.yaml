name: fierce
version: "1.0"
category: protocol/dns-reconnaissance
phase: reconnaissance
command: fierce
docker:
  image: kalilinux/fierce:latest
  args:
    - "--domain"
    - "${domain}"
    - "--output"
    - "/output/fierce-results.txt"
  memory_limit: "512m"
  timeout: "600s"

short_description: DNS reconnaissance tool
description: |
  Fierce is a semi-lightweight scanner that helps locate non-contiguous IP space.

parameters:
  - name: domain
    type: string
    required: true
    description: Target domain

output:
  format: text

enabled: true
