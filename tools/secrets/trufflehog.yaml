name: trufflehog
version: "1.0"
category: secrets/scanning
phase: scanning
command: trufflehog3
docker:
  image: phantomstrike/trufflehog3:latest
  args:
    - "filesystem"
    - "."
    - "--json"
    - "--only-verified"
  memory_limit: "512m"
  timeout: "300s"

short_description: Secret scanning and credential detection
description: |
  TruffleHog finds and verifies credentials in source code, Git history,
  and container images. Supports 750+ credential types including AWS keys,
  API tokens, private keys, and database connection strings.

parameters:
  - name: path
    type: string
    required: true
    description: Path to scan
  - name: branch
    type: string
    required: false
    description: Git branch to scan
  - name: since-commit
    type: string
    required: false
    description: Scan commits since this commit
  - name: only-verified
    type: boolean
    required: false
    default: true
    description: Only show verified secrets

output:
  format: json
  success_patterns:
    - "verified"
    - "found"
  failure_patterns:
    - "error"

chain_suggestions:
  before:
    - git-clone
  after:
    - gitleaks

enabled: true
