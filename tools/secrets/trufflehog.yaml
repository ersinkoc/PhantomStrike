name: trufflehog
version: "1.0"
category: secrets/scanning
phase: scanning
command: trufflehog3
args: ["filesystem", "--json", "--only-verified"]

docker:
  image: phantomstrike/trufflehog3:latest
  memory_limit: "512m"
  timeout: "300s"

short_description: Secret scanning and credential detection
description: |
  TruffleHog finds and verifies credentials in source code, Git history,
  and container images. Supports 750+ credential types including AWS keys,
  API tokens, private keys, and database connection strings.
notes: |
  - Syntax: trufflehog3 filesystem <path> [options]
  - Path is a positional argument after the subcommand

parameters:
  - name: branch
    type: string
    required: false
    flag: "--branch"
    description: "Git branch to scan"
  - name: since_commit
    type: string
    required: false
    flag: "--since-commit"
    description: "Scan commits since this commit"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Path to scan for secrets (offline tool — provide directory path)"

output:
  format: json
  success_patterns:
    - "verified"
    - "found"
  failure_patterns:
    - "error"

chain_suggestions:
  before:
    - git-clone
  after:
    - gitleaks

enabled: true
