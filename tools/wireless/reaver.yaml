name: reaver
version: "1.0"
category: wireless/wps-cracking
phase: exploitation
command: reaver
docker:
  image: phantomstrike/reaver:latest
  args:
    - "-i"
    - "${interface}"
    - "-b"
    - "${bssid}"
    - "-vv"
    - "-o"
    - "/output/reaver-results.txt"
  memory_limit: "512m"
  timeout: "3600s"
  privileged: true

short_description: WPS PIN brute forcer
description: |
  Reaver implements a brute force attack against WiFi Protected Setup
  (WPS) registrar PINs.

parameters:
  - name: interface
    type: string
    required: true
    description: Wireless interface
  - name: bssid
    type: string
    required: true
    description: Target BSSID

output:
  format: text

enabled: true
