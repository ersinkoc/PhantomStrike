name: bully
version: "1.0"
category: wireless/wps-cracking
phase: exploitation
command: bully
docker:
  image: rfhs/bully:latest
  args:
    - "-b"
    - "${bssid}"
    - "-c"
    - "${channel}"
    - "-o"
    - "/output/bully-results"
  memory_limit: "512m"
  timeout: "3600s"
  privileged: true

short_description: WPS brute force attack
description: |
  Bully is a new implementation of the WPS brute force attack.
  It is faster and more robust than Reaver.

parameters:
  - name: bssid
    type: string
    required: true
    description: Target BSSID
  - name: channel
    type: integer
    required: true
    description: Channel number

output:
  format: text

enabled: true
