name: bully
version: "1.0"
category: wireless/wps-cracking
phase: exploitation
command: bully

docker:
  image: phantomstrike/bully:latest
  memory_limit: "512m"
  timeout: "3600s"

short_description: WPS brute force attack
description: |
  Bully is a new implementation of the WPS brute force attack.
  It is faster and more robust than Reaver.
notes: |
  - Syntax: bully -b <bssid> -c <channel> <interface>
  - Interface is a positional argument
  - Requires monitor mode wireless interface

parameters:
  - name: bssid
    type: string
    required: true
    flag: "-b"
    description: "Target BSSID (MAC address)"
  - name: channel
    type: string
    required: true
    flag: "-c"
    description: "WiFi channel number"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Wireless interface in monitor mode (e.g. wlan0mon)"

output:
  format: text

enabled: true
