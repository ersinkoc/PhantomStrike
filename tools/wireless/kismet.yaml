name: kismet
version: "1.0"
category: wireless/network-detection
phase: reconnaissance
command: python3
args:
  - "/app/tools/_custom/kismet-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "2g"
  timeout: "3600s"

short_description: Wireless network detector
description: |
  Kismet is a wireless network and device detector, sniffer, wardriving
  tool, and WIDS framework.

parameters:
  - name: interface
    type: string
    required: true
    description: Wireless interface

output:
  format: xml

enabled: true
