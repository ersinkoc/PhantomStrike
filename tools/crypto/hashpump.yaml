name: hashpump
version: "1.0"
category: crypto/hash-length-extension
phase: exploitation
command: python3
args:
  - "/app/tools/_custom/hashpump-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: Hash length extension attack
description: |
  HashPump is a tool to exploit hash length extension vulnerabilities.

parameters:
  - name: signature
    type: string
    required: true
  - name: data
    type: string
    required: true
  - name: append
    type: string
    required: true
  - name: keylen
    type: integer
    required: true

output:
  format: text

enabled: true
