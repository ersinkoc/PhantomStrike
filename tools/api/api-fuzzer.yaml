name: api-fuzzer
version: "1.0"
category: api/fuzzing
phase: scanning
command: api-fuzzer
docker:
  image: phantomstrike/api-fuzzer:latest
  args:
    - "-t"
    - "${target}"
    - "-s"
    - "/output/api-fuzzer-results"
  memory_limit: "1g"
  timeout: "600s"

short_description: API fuzzing tool
description: |
  Automated API fuzzing for finding vulnerabilities.

parameters:
  - name: target
    type: string
    required: true

output:
  format: directory

enabled: false
