name: api-fuzzer
version: "1.0"
category: api/fuzzing
phase: scanning
command: python3
args: ["/app/tools/_custom/api-fuzzer.py"]
docker:
  image: phantomstrike/api-fuzzer:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: API endpoint fuzzer
description: |
  Automated API fuzzing using common endpoint paths.
  Tests for exposed API endpoints, admin panels, debug interfaces,
  and documentation pages.

parameters:
  - name: target
    type: string
    required: true
    description: Target base URL

output:
  format: text

enabled: true
