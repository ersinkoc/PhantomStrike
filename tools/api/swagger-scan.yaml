name: swagger-scan
version: "1.0"
category: api/swagger-security
phase: scanning
command: python3
args: ["/app/tools/_custom/swagger-scan.py"]
docker:
  image: phantomstrike/swagger-scan:latest
  memory_limit: "512m"
  timeout: "120s"

short_description: Swagger/OpenAPI security scanner
description: |
  Scans for exposed Swagger/OpenAPI documentation endpoints.
  Checks common paths for swagger.json, openapi.json, API docs, and Swagger UI.

parameters:
  - name: target
    type: string
    required: true
    description: Target base URL

output:
  format: text

enabled: true
