name: kiterunner
version: "1.0"
category: api/routing-discovery
phase: scanning
command: kite
docker:
  image: phantomstrike/kite:latest
  args:
    - "scan"
    - "-t"
    - "${target}"
    - "-w"
    - "/wordlists/routes-large.kite"
    - "-o"
    - "/output/kiterunner-results.json"
  memory_limit: "2g"
  timeout: "1800s"

short_description: API endpoint discovery
description: |
  Kiterunner is a tool that is capable of not only performing traditional content
  discovery at lightning fast speeds, but also bruteforcing routes/endpoints.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: wordlist
    type: string
    required: false
    default: "routes-large.kite"
    description: Kite wordlist

output:
  format: json

enabled: false
