name: kiterunner
version: "1.0"
category: api/routing-discovery
phase: scanning
command: python3
args:
  - "/app/tools/_custom/kiterunner-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "2g"
  timeout: "1800s"

short_description: API endpoint discovery
description: |
  Kiterunner is a tool that is capable of not only performing traditional content
  discovery at lightning fast speeds, but also bruteforcing routes/endpoints.

parameters:
  - name: target
    type: string
    required: true
    description: Target URL
  - name: wordlist
    type: string
    required: false
    default: "routes-large.kite"
    description: Kite wordlist

output:
  format: json

enabled: true
