name: strings
version: "1.0"
category: forensics/string-extraction
phase: analysis
command: strings

docker:
  image: phantomstrike/strings:latest
  memory_limit: "256m"
  timeout: "60s"

short_description: Extract strings from binary
description: |
  strings extracts printable strings from binary files.
  This is an offline tool that operates on local files, not remote targets.
notes: |
  - Syntax: strings -n <min_length> <file>
  - File path is a positional argument

parameters:
  - name: min_length
    type: string
    required: false
    flag: "-n"
    default: "6"
    description: "Minimum string length to extract"
  - name: target
    type: string
    required: true
    flag: ""
    description: "Path to binary file to extract strings from (offline tool — provide file path)"

output:
  format: text

enabled: true
