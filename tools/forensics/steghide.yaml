name: steghide
version: "1.0"
category: steganography/hide-extract
phase: analysis
command: steghide
args: ["extract", "-xf", "/output/extracted", "-f"]

docker:
  image: phantomstrike/steghide:latest
  memory_limit: "256m"
  timeout: "300s"

short_description: Steganography tool
description: |
  Steghide is a steganography program that hides data in image and audio files.
  This is an offline tool that operates on local image/audio files, not remote targets.
notes: |
  - Syntax: steghide extract -sf <file> [-p <password>] -xf <output>
  - This is an offline tool — target is a file path, not a hostname
  - Image/audio file must be mounted into the container at /input/

parameters:
  - name: target
    type: string
    required: true
    flag: "-sf"
    description: "Path to stego file to extract from (offline tool — provide file path, not hostname)"
  - name: password
    type: string
    required: false
    flag: "-p"
    description: "Passphrase for extraction"

output:
  format: binary

enabled: true
