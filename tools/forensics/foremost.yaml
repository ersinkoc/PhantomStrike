name: foremost
version: "1.0"
category: forensics/file-recovery
phase: analysis
command: foremost
args: ["-o", "/output/foremost", "-v"]

docker:
  image: phantomstrike/foremost:latest
  memory_limit: "1g"
  timeout: "1800s"

short_description: File recovery tool
description: |
  Foremost is a console program to recover files based on their headers,
  footers, and internal data structures. This is an offline tool that
  operates on local disk image files, not remote targets.
notes: |
  - Syntax: foremost -i <image> -o <outputdir> [options]
  - This is an offline tool — target is a file path, not a hostname
  - Disk image must be mounted into the container at /input/

parameters:
  - name: target
    type: string
    required: true
    flag: "-i"
    description: "Path to disk image or file to carve (offline tool — provide file path, not hostname)"

output:
  format: directory

enabled: true
