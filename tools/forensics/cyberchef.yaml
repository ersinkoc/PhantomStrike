name: cyberchef
version: "1.0"
category: forensics/data-transformation
phase: analysis
command: python3
args:
  - "/app/tools/_custom/cyberchef-lite.py"
docker:
  image: phantomstrike/custom:latest
  memory_limit: "1g"
  timeout: "3600s"

short_description: Cyber Swiss Army Knife
description: |
  CyberChef is a simple, intuitive web app for analysing and decoding
  data without having to deal with complex tools.

parameters:
  - name: port
    type: integer
    required: false
    default: 8080

output:
  format: web

enabled: true
