name: cloudsplaining
version: "1.0"
category: cloud/iam-security
phase: scanning
command: cloudsplaining
args: ["scan", "--output", "/output/cloudsplaining-results.json"]

docker:
  image: phantomstrike/cloudsplaining:latest
  memory_limit: "1g"
  timeout: "300s"

short_description: AWS IAM security assessment
description: |
  Cloudsplaining identifies violations of least privilege in AWS IAM policies
  and generates a risk-prioritized HTML report.
  This is an offline tool that operates on local IAM data files.
notes: |
  - Syntax: cloudsplaining scan --input-file <file> [options]

parameters:
  - name: target
    type: string
    required: true
    flag: "--input-file"
    description: "Path to IAM data JSON file (offline tool — provide file path)"

output:
  format: json

enabled: true
