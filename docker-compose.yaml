version: "3.8"

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:latest
    container_name: phantomstrike-db
    environment:
      POSTGRES_USER: phantomstrike
      POSTGRES_PASSWORD: phantomstrike
      POSTGRES_DB: phantomstrike
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantomstrike -d phantomstrike"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and session store
  redis:
    image: redis:7-alpine
    container_name: phantomstrike-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PhantomStrike API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantomstrike-api
    environment:
      DATABASE_URL: "postgres://phantomstrike:phantomstrike@postgres:5432/phantomstrike?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN:-}"
      CONFIG_PATH: "/app/config.yaml"
    volumes:
      - artifacts_data:/data/artifacts
      - /var/run/docker.sock:/var/run/docker.sock  # For tool execution in Docker
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"  # Metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phantomstrike
      - phantomstrike-tools

  # Frontend (Vite dev server for development)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: phantomstrike-web
    environment:
      VITE_API_URL: "http://localhost:8080"
      VITE_WS_URL: "ws://localhost:8080"
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  artifacts_data:

networks:
  phantomstrike:
    driver: bridge
  phantomstrike-tools:
    driver: bridge
    name: phantomstrike-tools
