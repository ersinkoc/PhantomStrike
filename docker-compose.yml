services:
  # --- Data ---
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: phantomstrike
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-phantom123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Optional: MinIO ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: phantom
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123}
    volumes:
      - miniodata:/data
    ports:
      - "19000:9000"
      - "19001:9001"
    profiles: ["full"]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
