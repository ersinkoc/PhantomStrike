services:
  # ─── PhantomStrike API Server ─────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18090:18090"
      - "18091:18091"
    environment:
      - DATABASE_URL=postgresql://phantom:phantom123@postgres:5432/phantomstrike
      - REDIS_URL=redis://redis:6379
      - SERVER_PORT=18090
      - STORAGE_PATH=/data/artifacts
      - JWT_SECRET=${JWT_SECRET:-phantomstrike-jwt-secret-change-me}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-phantomstrike-mcp-token}
    volumes:
      - ./tools:/app/tools:ro
      - ./tools/_custom:/app/tools/_custom:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
      - ./knowledge:/app/knowledge:ro
      - artifacts:/data/artifacts
      - app-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend (React SPA) ────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "15173:15173"
    environment:
      - VITE_API_URL=http://server:18090
    volumes:
      - ./web/src:/app/src
    depends_on:
      - server
    restart: unless-stopped

  # ─── All-in-One Security Tools ─────────────────────────
  # Build once: docker compose build tools
  # Contains: nmap, nuclei, httpx, subfinder, gobuster, ffuf, sqlmap, hydra, nikto, testssl, etc.
  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: phantomstrike-tools:latest
    profiles: ["build-tools"]
    command: ["echo", "Tools image built successfully"]

  # ─── PostgreSQL + pgvector ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: phantomstrike
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: phantom123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  artifacts:
  app-storage:
