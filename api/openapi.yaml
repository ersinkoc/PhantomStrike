openapi: 3.0.3
info:
  title: PhantomStrike API
  description: AI-Native Autonomous Security Testing Platform API
  version: 1.0.0
  contact:
    name: PhantomStrike
    url: https://github.com/ersinkoc/phantomstrike

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

security:
  - BearerAuth: []

paths:
  # Health
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # Authentication
  /auth/login:
    post:
      summary: Login
      description: Authenticate a user and return JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      summary: Register
      description: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "409":
          description: Email already exists

  /auth/me:
    get:
      summary: Get current user
      description: Returns the currently authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/refresh:
    post:
      summary: Refresh token
      description: Get a new access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refresh_token:
                    type: string

  # Missions
  /missions:
    get:
      summary: List missions
      description: Returns a list of missions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: object
                properties:
                  missions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Mission"

    post:
      summary: Create mission
      description: Create a new security testing mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionCreate"
      responses:
        "201":
          description: Mission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}:
    get:
      summary: Get mission
      description: Get mission details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
        "404":
          description: Mission not found

    put:
      summary: Update mission
      description: Update mission details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionUpdate"
      responses:
        "200":
          description: Mission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

    delete:
      summary: Delete mission
      description: Delete a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Mission deleted

  /missions/{id}/start:
    post:
      summary: Start mission
      description: Start a mission execution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission started
        "400":
          description: Mission cannot be started

  /missions/{id}/pause:
    post:
      summary: Pause mission
      description: Pause a running mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission paused

  /missions/{id}/cancel:
    post:
      summary: Cancel mission
      description: Cancel a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission cancelled

  /missions/{id}/chain:
    get:
      summary: Get attack chain
      description: Get the attack chain graph for a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attack chain data
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChainNode"
                  edges:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChainEdge"

  /missions/{id}/vulns:
    get:
      summary: Get mission vulnerabilities
      description: Get vulnerabilities found in a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission vulnerabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  vulnerabilities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Vulnerability"

  /missions/{id}/tools:
    get:
      summary: Get mission tool executions
      description: Returns tool execution history for a specific mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission tool executions
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        tool_name:
                          type: string
                        status:
                          type: string
                          enum: [running, completed, failed]
                        started_at:
                          type: string
                          format: date-time
                        finished_at:
                          type: string
                          format: date-time
                        output:
                          type: object
        "404":
          description: Mission not found

  /missions/{id}/reports:
    get:
      summary: Get mission reports
      description: Returns generated reports for a specific mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mission reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Report"
        "404":
          description: Mission not found

  # Vulnerabilities
  /vulnerabilities:
    get:
      summary: List vulnerabilities
      description: Returns a list of all vulnerabilities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
      responses:
        "200":
          description: List of vulnerabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  vulnerabilities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Vulnerability"

    post:
      summary: Create vulnerability
      description: Manually create a vulnerability finding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VulnerabilityCreate"
      responses:
        "201":
          description: Vulnerability created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vulnerability"

  /vulnerabilities/{id}:
    get:
      summary: Get vulnerability
      description: Get vulnerability details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Vulnerability details

    put:
      summary: Update vulnerability
      description: Update vulnerability details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VulnerabilityUpdate"
      responses:
        "200":
          description: Vulnerability updated

    delete:
      summary: Delete vulnerability
      description: Delete a vulnerability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Vulnerability deleted

  /vulnerabilities/stats:
    get:
      summary: Vulnerability statistics
      description: Get vulnerability count statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VulnStats"

  # Tools
  /tools:
    get:
      summary: List tools
      description: Returns available security tools
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tool"

  /tools/{name}:
    get:
      summary: Get tool
      description: Get tool details
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"

  /tools/{name}/toggle:
    put:
      summary: Toggle tool
      description: Enable or disable a tool
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean

  /tools/categories:
    get:
      summary: Tool categories
      description: Returns tool category list
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: string

  # Reports
  /reports:
    get:
      summary: List reports
      description: Returns generated reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Report"

    post:
      summary: Create report
      description: Generate a new report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreate"
      responses:
        "201":
          description: Report created

  /reports/{id}/download:
    get:
      summary: Download report
      description: Download a generated report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Report file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # Settings
  /settings:
    get:
      summary: Get settings
      description: Returns platform configuration
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: object
                  agent:
                    type: object
                  mcp:
                    type: object

    put:
      summary: Update settings
      description: Update platform configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Settings updated

  # Knowledge Base
  /knowledge:
    get:
      summary: List knowledge items
      description: Returns knowledge base entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge items

  /knowledge/search:
    post:
      summary: Search knowledge
      description: Search the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
      responses:
        "200":
          description: Search results

  # Scheduler
  /scheduler:
    get:
      summary: List scheduled jobs
      description: Returns scheduled scan jobs
      responses:
        "200":
          description: Scheduled jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduledJob"

    post:
      summary: Create scheduled job
      description: Create a new scheduled scan job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - cron_expr
                - mission_template
              properties:
                name:
                  type: string
                description:
                  type: string
                cron_expr:
                  type: string
                enabled:
                  type: boolean
                  default: true
                mission_template:
                  type: object
      responses:
        "201":
          description: Scheduled job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledJob"
        "400":
          description: Invalid input

  /scheduler/{id}:
    put:
      summary: Update scheduled job
      description: Update an existing scheduled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                cron_expr:
                  type: string
                enabled:
                  type: boolean
                mission_template:
                  type: object
      responses:
        "200":
          description: Scheduled job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledJob"
        "404":
          description: Scheduled job not found

    delete:
      summary: Delete scheduled job
      description: Delete a scheduled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job deleted

  /scheduler/{id}/trigger:
    post:
      summary: Trigger job
      description: Manually trigger a scheduled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job triggered

  # Roles & Skills
  /roles:
    get:
      summary: List roles
      description: Returns security testing roles
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"

    post:
      summary: Create role
      description: Create a new security testing role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                phases:
                  type: array
                  items:
                    type: string
                skills:
                  type: array
                  items:
                    type: string
                icon:
                  type: string
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          description: Invalid input
        "409":
          description: Role already exists

  /roles/{name}:
    put:
      summary: Update role
      description: Update an existing security testing role
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                phases:
                  type: array
                  items:
                    type: string
                skills:
                  type: array
                  items:
                    type: string
                icon:
                  type: string
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "404":
          description: Role not found

    delete:
      summary: Delete role
      description: Delete a security testing role
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Role deleted
        "404":
          description: Role not found

  /skills:
    get:
      summary: List skills
      description: Returns security testing skills
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: "#/components/schemas/Skill"

    post:
      summary: Create skill
      description: Create a new security testing skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - category
              properties:
                name:
                  type: string
                category:
                  type: string
                description:
                  type: string
                content:
                  type: string
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "400":
          description: Invalid input
        "409":
          description: Skill already exists

  /skills/{name}:
    put:
      summary: Update skill
      description: Update an existing security testing skill
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                description:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "404":
          description: Skill not found

    delete:
      summary: Delete skill
      description: Delete a security testing skill
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Skill deleted
        "404":
          description: Skill not found

  # Marketplace
  /marketplace/tools:
    get:
      summary: List marketplace tools
      description: Returns available tools from the community marketplace
      responses:
        "200":
          description: Marketplace tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        author:
                          type: string
                        version:
                          type: string
                        category:
                          type: string
                        downloads:
                          type: integer
                        installed:
                          type: boolean

  /marketplace/skills:
    get:
      summary: List marketplace skills
      description: Returns available skills from the community marketplace
      responses:
        "200":
          description: Marketplace skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        author:
                          type: string
                        version:
                          type: string
                        category:
                          type: string
                        downloads:
                          type: integer
                        installed:
                          type: boolean

  # Notifications
  /notifications/channels:
    get:
      summary: List notification channels
      description: Returns configured notification channels (Slack, Discord, Webhook)
      responses:
        "200":
          description: Notification channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationChannel"

  /notifications/channels/{type}/test:
    post:
      summary: Test notification channel
      description: Send a test notification to the specified channel type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [slack, discord, webhook]
      responses:
        "200":
          description: Test notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: Channel not configured

  # Admin
  /admin/users:
    get:
      summary: List users
      description: Returns all platform users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden - admin access required

  /admin/audit:
    get:
      summary: List audit log
      description: Returns audit log entries with pagination (admin only)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"
                  total:
                    type: integer
        "403":
          description: Forbidden - admin access required

  # OAuth2 Authentication
  /auth/github:
    get:
      summary: GitHub OAuth2 login
      description: Redirects the user to GitHub for OAuth2 authentication
      security: []
      responses:
        "302":
          description: Redirect to GitHub authorization page

  /auth/github/callback:
    get:
      summary: GitHub OAuth2 callback
      description: Handles the OAuth2 callback from GitHub and issues JWT tokens
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to application with auth tokens
        "400":
          description: Invalid callback parameters

  /auth/google:
    get:
      summary: Google OAuth2 login
      description: Redirects the user to Google for OAuth2 authentication
      security: []
      responses:
        "302":
          description: Redirect to Google authorization page

  /auth/google/callback:
    get:
      summary: Google OAuth2 callback
      description: Handles the OAuth2 callback from Google and issues JWT tokens
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to application with auth tokens
        "400":
          description: Invalid callback parameters

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
