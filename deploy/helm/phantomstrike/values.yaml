# Default values for phantomstrike.

replicaCount: 1

image:
  repository: phantomstrike
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: phantomstrike.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: phantomstrike-tls
  #    hosts:
  #      - phantomstrike.local

postgresql:
  enabled: true
  auth:
    username: phantom
    password: changeme
    database: phantomstrike
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

redis:
  enabled: true
  auth:
    enabled: true
    password: changeme

env:
  DATABASE_URL: "postgres://phantom:changeme@phantomstrike-postgresql:5432/phantomstrike?sslmode=disable"
  REDIS_URL: "redis://:changeme@phantomstrike-redis:6379/0"
  JWT_SECRET: "change-me-in-production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
