apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phantomstrike.fullname" . }}
  labels:
    {{- include "phantomstrike.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  LOG_FORMAT: {{ .Values.env.LOG_FORMAT | quote }}
  SERVER_HOST: {{ .Values.env.SERVER_HOST | quote }}
  SERVER_PORT: {{ .Values.env.SERVER_PORT | quote }}
